<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selah Bible | Deep Insight Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        :root { --font-main: 'Plus Jakarta Sans', sans-serif; --font-reading: 'Lora', serif; }
        body { font-family: var(--font-main); transition: background-color 0.4s; overflow-x: hidden; min-height: 100vh; }
        .reading-text { font-family: var(--font-reading); }
        .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); }
        .insight-panel { max-height: 0; overflow: hidden; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .insight-panel.open { max-height: 2500px; opacity: 1; margin-top: 1.5rem; border-left: 4px solid #6366f1; padding-left: 1.5rem; }
        .progress-ring__circle { transition: stroke-dashoffset 0.8s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .step-pill { opacity: 0.4; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: all 0.3s; }
        .step-pill.active { background: #6366f1; color: white; opacity: 1; padding: 4px 12px; border-radius: 99px; }
        .aurora-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #fdfeff; }
        .dark .aurora-bg { background: #020617; }
        @keyframes pulse-audio {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); background: rgba(99, 102, 241, 0.08); }
            100% { transform: scale(1); }
        }
        .audio-playing-row { animation: pulse-audio 1.5s infinite; border-radius: 1.5rem; border: 1px solid rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

    <div class="aurora-bg"></div>

    <nav class="sticky top-0 z-50 glass-card border-b border-slate-200/50 dark:border-slate-800/50 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <h1 class="text-2xl font-bold tracking-tighter cursor-pointer" onclick="resetToLibrary()">SELAH</h1>
            <div class="flex-grow max-w-md relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="globalSearch" placeholder="Search Bible..." 
                    class="w-full bg-slate-100/50 dark:bg-slate-900/50 border border-transparent focus:border-indigo-500/50 rounded-2xl py-2 pl-10 pr-4 text-sm outline-none transition-all"
                    onkeypress="if(event.key === 'Enter') handleSearch(this.value)">
            </div>
            <div class="flex items-center gap-2">
                <button onclick="resetToLibrary()" class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-xl transition-colors" title="Home">
                    <i class="fas fa-house text-slate-500 dark:text-slate-400"></i>
                </button>
                <button onclick="toggleDarkMode()" class="p-2 hover:rotate-12 transition-transform">
                    <i id="themeIcon" class="fas fa-moon text-slate-500"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="progressContainer" class="hidden sticky top-[73px] z-40 w-full h-1 bg-slate-200 dark:bg-slate-800">
        <div id="progressBar" class="h-full bg-indigo-500" style="width: 0%"></div>
    </div>

    <main class="max-w-4xl mx-auto p-4 md:p-8 relative z-10">
        <div id="selectionFlow" class="mb-8 hidden flex items-center justify-center gap-2 text-slate-400">
            <span id="step1" class="step-pill">1. Book</span>
            <i class="fas fa-chevron-right text-[8px]"></i>
            <span id="step2" class="step-pill">2. Chapter</span>
        </div>

        <div id="viewContainer">
            <div id="libraryView">
                <div class="mb-10">
                    <h2 class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-4">Verse of the Day</h2>
                    <div class="glass-card rounded-3xl p-6 md:p-8 border border-indigo-100 dark:border-indigo-900/30">
                        <p id="votdText" class="text-xl md:text-2xl font-serif italic mb-4">"Thy word is a lamp unto my feet..."</p>
                        <div class="flex items-center justify-between">
                            <span id="votdRef" class="font-bold text-indigo-500 cursor-pointer" onclick="openVotd()">Psalm 119:105</span>
                            <button onclick="toggleInsight('votd-insight', 'Psalms', 119, 105)" class="bg-indigo-500/10 text-indigo-500 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                                <i class="fas fa-lightbulb"></i> Explain
                            </button>
                        </div>
                        <div id="votd-insight" class="insight-panel bg-white/50 dark:bg-slate-900/50 rounded-2xl p-6 mt-4"></div>
                    </div>
                </div>

                <div id="historySection" class="mb-10 hidden">
                    <h2 class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-4">Continue Reading</h2>
                    <div id="historyGrid" class="flex gap-4 overflow-x-auto pb-4 custom-scrollbar"></div>
                </div>

                <div id="otSection"><h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Old Testament</h2><div id="otGrid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-3 mb-10"></div></div>
                <div id="ntSection"><h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">New Testament</h2><div id="ntGrid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-3"></div></div>
            </div>

            <div id="selectionView" class="hidden">
                <h2 id="selectionTitle" class="text-3xl font-bold mb-8 text-center"></h2>
                <div id="selectionGrid" class="grid grid-cols-5 sm:grid-cols-8 gap-2"></div>
            </div>

            <div id="readerView" class="hidden">
                <div class="flex items-center justify-between mb-6">
                    <button onclick="navChapter(-1)" class="p-3 glass-card rounded-xl hover:bg-indigo-500 hover:text-white transition-all">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <select id="chapterJumpDropdown" onchange="jumpToChapter(this.value)" class="glass-card px-4 py-2 rounded-xl text-xs font-black uppercase outline-none bg-transparent cursor-pointer"></select>
                    <button onclick="navChapter(1)" class="p-3 glass-card rounded-xl hover:bg-indigo-500 hover:text-white transition-all">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>

                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 border-b dark:border-slate-800 pb-4 gap-4">
                    <div>
                        <h2 id="readerTitle" class="text-3xl md:text-4xl font-serif font-bold"></h2>
                        <div class="flex flex-wrap items-center gap-3 mt-4">
                            <select id="verseDropdown" onchange="jumpToVerse(this.value)" class="glass-card px-4 py-2 rounded-xl text-xs font-bold outline-none bg-transparent">
                                <option value="">Jump Verse</option>
                            </select>
                            
                            <select id="audioSpeed" class="glass-card px-4 py-2 rounded-xl text-xs font-bold outline-none bg-transparent">
                                <option value="0.5">0.5x Speed</option>
                                <option value="0.8">0.8x Speed</option>
                                <option value="1.0" selected>1.0x Speed</option>
                                <option value="1.2">1.2x Speed</option>
                                <option value="1.5">1.5x Speed</option>
                                <option value="2.0">2.0x Speed</option>
                            </select>

                            <div class="flex gap-2">
                                <button id="btn-read-all" onclick="readFullChapter()" class="glass-card px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 hover:bg-indigo-500 hover:text-white transition-all ring-2 ring-indigo-500/20">
                                    <i class="fas fa-play"></i> <span id="read-all-text">Read All</span>
                                </button>
                                
                                <button id="btn-restart-audio" onclick="restartReading()" class="glass-card px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 hover:bg-slate-500 hover:text-white transition-all hidden">
                                    <i class="fas fa-redo"></i> Restart
                                </button>

                                <button id="btn-stop-all" onclick="stopAudio()" class="glass-card px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 hover:bg-red-500 hover:text-white transition-all hidden">
                                    <i class="fas fa-stop"></i> Stop
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="verseList" class="reading-text space-y-12 pb-10"></div>

                <div class="flex items-center justify-between mt-10 pb-20 border-t dark:border-slate-800 pt-8">
                    <button onclick="navChapter(-1)" class="flex items-center gap-3 px-6 py-4 glass-card rounded-2xl hover:bg-indigo-500 hover:text-white transition-all group">
                        <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                        <div class="text-left"><p class="text-[10px] uppercase opacity-50 font-bold">Previous</p><p class="text-sm font-bold">Chapter</p></div>
                    </button>
                    <button onclick="navChapter(1)" class="flex items-center gap-3 px-6 py-4 glass-card rounded-2xl hover:bg-indigo-500 hover:text-white transition-all group">
                        <div class="text-right"><p class="text-[10px] uppercase opacity-50 font-bold">Next</p><p class="text-sm font-bold">Chapter</p></div>
                        <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const BIBLE_BOOKS = {
            OT: [["Genesis", 50], ["Exodus", 40], ["Leviticus", 27], ["Numbers", 36], ["Deuteronomy", 34], ["Joshua", 24], ["Judges", 21], ["Ruth", 4], ["1 Samuel", 31], ["2 Samuel", 24], ["1 Kings", 22], ["2 Kings", 25], ["1 Chronicles", 29], ["2 Chronicles", 36], ["Ezra", 10], ["Nehemiah", 13], ["Esther", 10], ["Job", 42], ["Psalms", 150], ["Proverbs", 31], ["Ecclesiastes", 12], ["Song of Solomon", 8], ["Isaiah", 66], ["Jeremiah", 52], ["Lamentations", 5], ["Ezekiel", 48], ["Daniel", 12], ["Hosea", 14], ["Joel", 3], ["Amos", 9], ["Obadiah", 1], ["Jonah", 4], ["Micah", 7], ["Nahum", 3], ["Habakkuk", 3], ["Zephaniah", 3], ["Haggai", 2], ["Zechariah", 14], ["Malachi", 4]],
            NT: [["Matthew", 28], ["Mark", 16], ["Luke", 24], ["John", 21], ["Acts", 28], ["Romans", 16], ["1 Corinthians", 16], ["2 Corinthians", 13], ["Galatians", 6], ["Ephesians", 6], ["Philippians", 4], ["Colossians", 4], ["1 Thessalonians", 5], ["2 Thessalonians", 3], ["1 Timothy", 6], ["2 Timothy", 4], ["Titus", 3], ["Philemon", 1], ["Hebrews", 13], ["James", 5], ["1 Peter", 5], ["2 Peter", 3], ["1 John", 5], ["2 John", 1], ["3 John", 1], ["Jude", 1], ["Revelation", 22]]
        };

        // NEW: Semantic Library for word-by-word contextual generation
        const semanticLibrary = {
            "light": {
                aspect1: { title: "Divine Illumination", text: "Light represents God's presence, truth, and moral purity breaking into darkness." },
                aspect2: { title: "Guidance", text: "It serves as a metaphor for divine direction, showing the clear path amidst confusion." },
                deep: "Just as physical light reveals our surroundings, spiritual light exposes truth and gives us the clarity to move forward with confidence."
            },
            "love": {
                aspect1: { title: "Agape", text: "This refers to unconditional, self-sacrificing love that originates from the divine nature." },
                aspect2: { title: "Relational Bond", text: "Love acts as the perfect bond of unity, bridging the gap between humanity and the Creator." },
                deep: "Love is not merely an emotion, but an action and a choice to seek the highest good for others, reflecting the very heart of God."
            },
            "word": {
                aspect1: { title: "Creative Power", text: "The 'Word' signifies the mechanism by which the universe was spoken into existence." },
                aspect2: { title: "Ultimate Truth", text: "It represents the foundational truth and the ultimate revelation of the divine will." },
                deep: "The Word is an active, living force that has the power to transform reality and reshape our understanding of life."
            },
            "lamp": {
                aspect1: { title: "Immediate Guidance", text: "A lamp provides just enough light for the very next step, requiring daily trust." },
                aspect2: { title: "Comfort in Darkness", text: "It signifies warmth and safety when surrounded by the unknown." },
                deep: "We aren't promised to see the entire horizon at once; rather, we are given enough light to faithfully take the next right step."
            },
            "faith": {
                aspect1: { title: "Substance of Hope", text: "Faith is the confident expectation and the tangible assurance of things unseen." },
                aspect2: { title: "Active Trust", text: "It goes beyond belief, manifesting as action based on divine promises." },
                deep: "Faith bridges the gap between our current reality and the ultimate promises of eternity, anchoring our soul."
            },
            "grace": {
                aspect1: { title: "Unmerited Favor", text: "Grace is a gift given not because it is earned, but out of absolute generosity." },
                aspect2: { title: "Transformative Power", text: "It empowers the recipient to live beyond their natural capacity." },
                deep: "Grace rewrites our story, replacing the weight of our shortcomings with the freedom of divine acceptance."
            },
            "water": {
                aspect1: { title: "Purification", text: "Water is a deeply symbolic element representing cleansing and spiritual renewal." },
                aspect2: { title: "Sustenance", text: "It points to the life-giving nature of God, quenching the ultimate thirst of the soul." },
                deep: "Just as water restores parched ground, this truth revives the exhausted spirit and brings forth new growth."
            },
            "heart": {
                aspect1: { title: "The Core of Being", text: "The heart represents the center of human will, emotion, and intellect." },
                aspect2: { title: "Inner Transformation", text: "It points to the reality that true change happens from the inside out." },
                deep: "Outward actions are merely echoes; the true battleground of life and faith is fought within the sanctuary of the heart."
            },
            "peace": {
                aspect1: { title: "Shalom", text: "Peace here means wholeness, completeness, and the absence of inner turmoil." },
                aspect2: { title: "Divine Stillness", text: "It is a supernatural calm that defies external circumstances." },
                deep: "True peace is not the absence of storms, but the presence of an anchor that holds fast no matter how hard the wind blows."
            }
        };

        let state = { book: "John", chapter: 1, maxChapters: 21, currentVerses: [], lastVersePlayedIndex: 0 };
        let history = JSON.parse(localStorage.getItem('selah_history')) || [];
        let synth = window.speechSynthesis;
        let isReadingAll = false;
        let currentPlayingBtnId = null;
        let wakeLock = null;

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `${state.book} ${state.chapter}`,
                    artist: 'Selah Bible Reader',
                    album: 'Holy Bible'
                });
                navigator.mediaSession.setActionHandler('pause', () => stopAudio());
                navigator.mediaSession.setActionHandler('stop', () => stopAudio());
            }
        }

        function init() { renderLibrary(); renderHistory(); fetchVOTD(); applyTheme(localStorage.getItem('theme') === 'dark'); }

        function stopAudio() { 
            synth.cancel(); isReadingAll = false;
            if(wakeLock !== null) { try { wakeLock.release(); } catch(e){} wakeLock = null; }
            if(currentPlayingBtnId) {
                const btnIcon = document.querySelector(`#${currentPlayingBtnId} i`);
                if(btnIcon) btnIcon.className = "fas fa-volume-up";
                currentPlayingBtnId = null;
            }
            document.querySelectorAll('.audio-playing-row').forEach(el => el.classList.remove('audio-playing-row')); 
            document.getElementById('btn-stop-all').classList.add('hidden');
            document.getElementById('btn-restart-audio').classList.add('hidden');
            document.getElementById('btn-read-all').classList.remove('hidden');
            document.getElementById('read-all-text').innerText = (state.lastVersePlayedIndex > 0) ? "Resume Reading" : "Read All";
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
        }

        function restartReading() {
            state.lastVersePlayedIndex = 0;
            readFullChapter();
        }

        function toggleExplanationAudio(text, btnId) {
            if (currentPlayingBtnId === btnId) { stopAudio(); return; }
            stopAudio();
            requestWakeLock();
            currentPlayingBtnId = btnId;
            const btnIcon = document.querySelector(`#${btnId} i`);
            if(btnIcon) btnIcon.className = "fas fa-stop";
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = parseFloat(document.getElementById('audioSpeed').value) || 1.0;
            utter.onend = () => { if(btnIcon) btnIcon.className = "fas fa-volume-up"; currentPlayingBtnId = null; };
            synth.speak(utter);
        }

        async function readFullChapter() {
            stopAudio(); 
            isReadingAll = true;
            await requestWakeLock();
            updateMediaSession();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';

            document.getElementById('btn-read-all').classList.add('hidden');
            document.getElementById('btn-stop-all').classList.remove('hidden');
            document.getElementById('btn-restart-audio').classList.remove('hidden');

            for(let i = state.lastVersePlayedIndex; i < state.currentVerses.length; i++) {
                if(!isReadingAll) break;
                state.lastVersePlayedIndex = i;
                const v = state.currentVerses[i];
                const vEl = document.getElementById(`v-${v.verse}`);
                
                if (document.visibilityState === 'visible' && vEl) {
                    vEl.scrollIntoView({behavior:'smooth', block:'center'});
                }
                
                if(vEl) vEl.classList.add('audio-playing-row');
                const utter = new SpeechSynthesisUtterance(`Verse ${v.verse}. ${v.text}`);
                utter.rate = parseFloat(document.getElementById('audioSpeed').value) || 1.0;
                
                await new Promise(res => { 
                    utter.onend = () => { 
                        if(vEl) vEl.classList.remove('audio-playing-row'); 
                        res(); 
                    }; 
                    synth.speak(utter); 
                });
            }

            if(isReadingAll) { 
                state.lastVersePlayedIndex = 0; 
                if (state.chapter < state.maxChapters) {
                    state.chapter++;
                    await fetchChapter();
                    setTimeout(() => { if(isReadingAll) readFullChapter(); }, 500);
                } else {
                    stopAudio(); 
                }
            }
        }

        // UPDATED: Dynamic Word-By-Word Content Generator
        function generateExpandedExplanation(book, chap, v, verseText) {
            const lowerText = verseText.toLowerCase();
            let foundThemes = [];
            
            // Scan the verse for keywords
            Object.keys(semanticLibrary).forEach(keyword => {
                const regex = new RegExp(`\\b${keyword}\\b`, 'i');
                if (regex.test(lowerText)) {
                    foundThemes.push(semanticLibrary[keyword]);
                }
            });

            let aspect1, aspect2, deepVal;

            // Assemble the insights based on found words
            if (foundThemes.length >= 2) {
                aspect1 = foundThemes[0].aspect1;
                aspect2 = foundThemes[1].aspect2; // Mix themes if multiple words found
                deepVal = foundThemes[0].deep;
            } else if (foundThemes.length === 1) {
                aspect1 = foundThemes[0].aspect1;
                aspect2 = foundThemes[0].aspect2;
                deepVal = foundThemes[0].deep;
            } else {
                // Fallback: General theological insight if no specific keywords match
                const seed = (book.length * 41) + (chap * 17) + (v * 7);
                const generalAspects = [
                    { title: "Historical Context", text: "This passage connects deeply to the cultural and historical realities of its time." },
                    { title: "Personal Reflection", text: "The words challenge the reader to internalize these ancient truths in a modern context." },
                    { title: "Divine Authority", text: "This verse signifies absolute sovereignty and authority over all creation." },
                    { title: "Enduring Promise", text: "It serves as a reminder of promises that transcend generations." }
                ];
                const generalDeep = [
                    "Even in seemingly mundane passages, there is a profound invitation to trust in a higher purpose.",
                    "True wisdom is found in meditating on these words and applying their timeless principles daily.",
                    "This verse invites us to consider the timeless nature of divine wisdom in our daily walk."
                ];
                aspect1 = generalAspects[seed % generalAspects.length];
                aspect2 = generalAspects[(seed + 1) % generalAspects.length];
                deepVal = generalDeep[seed % generalDeep.length];
            }

            const fullTextForSpeech = `Deep Insight for ${book} chapter ${chap} verse ${v}. Aspect one: ${aspect1.title}. ${aspect1.text}. Aspect two: ${aspect2.title}. ${aspect2.text}. Overall meaning: ${deepVal}`;

            const html = `
                <div class="space-y-6">
                    <div class="flex justify-between items-center border-b border-indigo-100 dark:border-indigo-900/30 pb-2">
                        <h3 class="text-xs font-black text-indigo-500 uppercase tracking-widest">Key Aspects of Verse ${v}</h3>
                        <button id="btn-audio-ex-${v}" onclick="toggleExplanationAudio('${fullTextForSpeech.replace(/'/g, "\\'")}', 'btn-audio-ex-${v}')" 
                                class="text-indigo-500 hover:text-indigo-600 transition-colors">
                            <i class="fas fa-volume-up"></i> Listen
                        </button>
                    </div>
                    
                    <ul class="space-y-4">
                        <li class="flex gap-3">
                            <span class="text-indigo-500 font-bold">•</span>
                            <p class="text-sm"><strong class="text-indigo-600 dark:text-indigo-400">${aspect1.title}:</strong> ${aspect1.text}</p>
                        </li>
                        <li class="flex gap-3">
                            <span class="text-indigo-500 font-bold">•</span>
                            <p class="text-sm"><strong class="text-indigo-600 dark:text-indigo-400">${aspect2.title}:</strong> ${aspect2.text}</p>
                        </li>
                    </ul>

                    <div class="bg-indigo-50/50 dark:bg-indigo-900/20 p-4 rounded-2xl">
                        <span class="text-[10px] font-black uppercase text-indigo-500 block mb-2">Deep Meaning:</span>
                        <p class="text-base leading-relaxed italic text-slate-700 dark:text-slate-300">"${deepVal}"</p>
                    </div>
                </div>
            `;

            return { html, text: fullTextForSpeech };
        }

        // Updated to pass the actual verse text into the generator
        function toggleInsight(panelId, book, chap, v) {
            const panel = document.getElementById(panelId);
            const isOpen = panel.classList.contains('open');
            document.querySelectorAll('.insight-panel').forEach(p => p.classList.remove('open'));
            
            if (!isOpen) { 
                let textToAnalyze = "";
                if (panelId === 'votd-insight') {
                    // Extract text for Verse of the Day
                    textToAnalyze = document.getElementById('votdText').innerText;
                } else {
                    // Extract text from loaded chapter verses
                    const verseData = state.currentVerses.find(vs => vs.verse == v);
                    if (verseData) textToAnalyze = verseData.text;
                }

                panel.innerHTML = generateExpandedExplanation(book, chap, v, textToAnalyze).html; 
                panel.classList.add('open'); 
            }
        }

        async function fetchChapter() {
            if(!isReadingAll) state.lastVersePlayedIndex = 0;
            showView('reader'); saveHistory();
            updateChapterJumpDropdown();
            document.getElementById('progressContainer').classList.remove('hidden');
            const list = document.getElementById('verseList');
            list.innerHTML = '<p class="text-center py-20 animate-pulse text-indigo-500 font-bold text-lg">Opening the Word...</p>';
            try {
                const res = await fetch(`https://bible-api.com/${state.book}+${state.chapter}`);
                const data = await res.json();
                state.currentVerses = data.verses;
                document.getElementById('readerTitle').innerText = data.reference;
                const dropdown = document.getElementById('verseDropdown');
                dropdown.innerHTML = '<option value="">Jump Verse</option>';
                list.innerHTML = '';
                data.verses.forEach(v => {
                    const opt = document.createElement('option'); opt.value = `v-${v.verse}`; opt.innerText = `Verse ${v.verse}`; dropdown.appendChild(opt);
                    const div = document.createElement('div'); div.id = `v-${v.verse}`; div.className = "p-4 transition-all duration-500 border-b border-slate-100 dark:border-slate-800/50 pb-8";
                    div.innerHTML = `<div class="flex justify-between items-start gap-4"><div class="flex gap-4"><span class="text-indigo-400 font-bold text-sm mt-1">${v.verse}</span><p class="text-xl md:text-2xl leading-relaxed">${v.text}</p></div><button onclick="toggleInsight('insight-${v.verse}', '${state.book}', ${state.chapter}, ${v.verse})" class="w-10 h-10 rounded-full bg-indigo-500/10 text-indigo-500 flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all flex-shrink-0"><i class="fas fa-lightbulb"></i></button></div><div id="insight-${v.verse}" class="insight-panel bg-white/40 dark:bg-slate-900/40 rounded-3xl p-6 mt-4"></div>`;
                    list.appendChild(div);
                });
                if(!isReadingAll) window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) { list.innerHTML = 'Error loading chapter.'; }
        }

        function updateChapterJumpDropdown() {
            const dropdown = document.getElementById('chapterJumpDropdown');
            dropdown.innerHTML = '';
            for(let i=1; i<=state.maxChapters; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.innerText = `Ch. ${i}`;
                if(i === state.chapter) opt.selected = true;
                dropdown.appendChild(opt);
            }
        }

        function jumpToChapter(val) { stopAudio(); state.chapter = parseInt(val); fetchChapter(); }
        function navChapter(dir) {
            stopAudio();
            let nextChap = state.chapter + dir;
            if (nextChap >= 1 && nextChap <= state.maxChapters) { state.chapter = nextChap; fetchChapter(); }
        }

        function renderLibrary() {
            const setup = (list, id) => {
                const g = document.getElementById(id); g.innerHTML = '';
                list.forEach(([name, chaps]) => {
                    const b = document.createElement('button');
                    b.className = "p-4 glass-card rounded-2xl text-left font-bold text-sm hover:scale-105 transition-all flex items-center justify-between";
                    b.innerHTML = `<span>${name}</span> <i class="fas fa-chevron-right text-[8px] opacity-30"></i>`;
                    b.onclick = () => selectBook(name, chaps);
                    g.appendChild(b);
                });
            };
            setup(BIBLE_BOOKS.OT, 'otGrid'); setup(BIBLE_BOOKS.NT, 'ntGrid');
        }

        function selectBook(name, chaps) {
            state.book = name; state.maxChapters = chaps;
            showView('selection'); updateSteps(2);
            document.getElementById('selectionTitle').innerText = name;
            const grid = document.getElementById('selectionGrid'); grid.innerHTML = '';
            for (let i = 1; i <= chaps; i++) {
                const btn = document.createElement('button');
                btn.className = "p-4 glass-card rounded-xl font-bold hover:bg-indigo-600 hover:text-white transition-all";
                btn.innerText = i; btn.onclick = () => { state.chapter = i; fetchChapter(); };
                grid.appendChild(btn);
            }
        }

        function renderHistory() {
            const grid = document.getElementById('historyGrid'); if (history.length === 0) return;
            document.getElementById('historySection').classList.remove('hidden');
            grid.innerHTML = history.map(item => {
                const radius = 15; const circ = 2 * Math.PI * radius;
                return `<button onclick="state.book='${item.book}'; state.chapter=${item.chapter}; state.maxChapters=${findMax(item.book)}; fetchChapter()" class="flex-shrink-0 w-44 p-4 glass-card rounded-3xl text-left flex items-center gap-3">
                    <div class="relative w-10 h-10"><svg class="w-full h-full"><circle class="text-slate-200 dark:text-slate-800" stroke-width="3" stroke="currentColor" fill="transparent" r="${radius}" cx="20" cy="20"/><circle class="text-indigo-500 progress-ring__circle" stroke-width="3" stroke-dasharray="${circ} ${circ}" stroke-dashoffset="${circ}" data-percent="${item.percent}" stroke-linecap="round" stroke="currentColor" fill="transparent" r="${radius}" cx="20" cy="20"/></svg><span class="absolute inset-0 flex items-center justify-center text-[8px] font-black">${item.percent}%</span></div>
                    <div class="overflow-hidden"><p class="text-[10px] font-bold text-indigo-500 uppercase truncate mb-1">${item.book}</p><p class="text-xs font-black">Ch. ${item.chapter}</p></div></button>`;
            }).join('');
            requestAnimationFrame(() => {
                document.querySelectorAll('.progress-ring__circle').forEach(c => {
                    const p = c.getAttribute('data-percent'); const r = c.r.baseVal.value; const circ = 2 * Math.PI * r;
                    c.style.strokeDashoffset = circ - (p / 100 * circ);
                });
            });
        }

        function findMax(name) {
            const all = [...BIBLE_BOOKS.OT, ...BIBLE_BOOKS.NT];
            const book = all.find(b => b[0] === name);
            return book ? book[1] : 50;
        }

        function saveHistory() {
            const percent = Math.round((state.chapter / state.maxChapters) * 100);
            history = history.filter(h => h.book !== state.book);
            history.unshift({ book: state.book, chapter: state.chapter, percent });
            localStorage.setItem('selah_history', JSON.stringify(history.slice(0, 5)));
            renderHistory();
        }

        async function fetchVOTD() { try { const res = await fetch(`https://bible-api.com/Psalm+119:105`); const data = await res.json(); document.getElementById('votdText').innerText = `"${data.text.trim()}"`; } catch (e) {} }
        async function handleSearch(val) { const res = await fetch(`https://bible-api.com/${val}`); const data = await res.json(); if(data.verses) { stopAudio(); state.book = data.verses[0].book_name; state.chapter = data.verses[0].chapter; state.maxChapters = findMax(state.book); fetchChapter(); } }
        function resetToLibrary() { stopAudio(); showView('library'); document.getElementById('selectionFlow').classList.add('hidden'); document.getElementById('progressContainer').classList.add('hidden'); }
        function showView(v) { ['library', 'selection', 'reader'].forEach(id => document.getElementById(id + 'View').classList.add('hidden')); document.getElementById(v + 'View').classList.remove('hidden'); }
        function updateSteps(s) { document.getElementById('selectionFlow').classList.remove('hidden'); document.querySelectorAll('.step-pill').forEach((p, i) => p.classList.toggle('active', i + 1 === s)); }
        function toggleDarkMode() { const d = !document.documentElement.classList.contains('dark'); applyTheme(d); localStorage.setItem('theme', d ? 'dark' : 'light'); }
        function applyTheme(d) { document.documentElement.classList.toggle('dark', d); document.getElementById('themeIcon').className = d ? 'fas fa-sun text-amber-400' : 'fas fa-moon text-slate-500'; }
        function openVotd() { stopAudio(); state.book="Psalms"; state.chapter=119; state.maxChapters=150; fetchChapter(); }
        function jumpToVerse(id) { const el = document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth', block:'center'}); }

        init();
    </script>
</body>
</html>
