<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selah Bible | Deep Insight Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        :root { --font-main: 'Plus Jakarta Sans', sans-serif; --font-reading: 'Lora', serif; }
        body { font-family: var(--font-main); transition: background-color 0.4s; overflow-x: hidden; min-height: 100vh; }
        .reading-text { font-family: var(--font-reading); }
        .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); }
        .insight-panel { max-height: 0; overflow: hidden; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .insight-panel.open { max-height: 2500px; opacity: 1; margin-top: 1.5rem; border-left: 4px solid #6366f1; padding-left: 1.5rem; }
        .progress-ring__circle { transition: stroke-dashoffset 0.8s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .step-pill { opacity: 0.4; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: all 0.3s; }
        .step-pill.active { background: #6366f1; color: white; opacity: 1; padding: 4px 12px; border-radius: 99px; }
        .aurora-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #fdfeff; }
        .dark .aurora-bg { background: #020617; }
        @keyframes pulse-audio {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); background: rgba(99, 102, 241, 0.08); }
            100% { transform: scale(1); }
        }
        .audio-playing-row { animation: pulse-audio 1.5s infinite; border-radius: 1.5rem; border: 1px solid rgba(99, 102, 241, 0.2); }
        
        /* New styles for AI explanation format */
        .verse-reference { color: #6366f1; font-weight: 600; text-decoration: underline; cursor: pointer; }
        .verse-reference:hover { color: #4f46e5; }
        .key-concept { background: rgba(99, 102, 241, 0.15); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .explanation-text { line-height: 1.8; color: #334155; }
        .dark .explanation-text { color: #cbd5e1; }
        
        /* Audio button states */
        .audio-btn-playing { color: #6366f1; animation: pulse 1.5s infinite; }
        .audio-btn-loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

    <div class="aurora-bg"></div>

    <nav class="sticky top-0 z-50 glass-card border-b border-slate-200/50 dark:border-slate-800/50 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <h1 class="text-2xl font-bold tracking-tighter cursor-pointer" onclick="resetToLibrary()">SELAH</h1>
            <div class="flex-grow max-w-md relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="globalSearch" placeholder="Search Bible (e.g. John 3:16)..." 
                    class="w-full bg-slate-100/50 dark:bg-slate-900/50 border border-transparent focus:border-indigo-500/50 rounded-2xl py-2 pl-10 pr-4 text-sm outline-none transition-all"
                    onkeypress="if(event.key === 'Enter') handleSearch(this.value)">
            </div>
            <div class="flex items-center gap-2">
                <button onclick="resetToLibrary()" class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-xl transition-colors" title="Home">
                    <i class="fas fa-house text-slate-500 dark:text-slate-400"></i>
                </button>
                <button onclick="toggleDarkMode()" class="p-2 hover:rotate-12 transition-transform">
                    <i id="themeIcon" class="fas fa-moon text-slate-500"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="progressContainer" class="hidden sticky top-[73px] z-40 w-full h-1 bg-slate-200 dark:bg-slate-800">
        <div id="progressBar" class="h-full bg-indigo-500" style="width: 0%"></div>
    </div>

    <main class="max-w-4xl mx-auto p-4 md:p-8 relative z-10">
        <div id="selectionFlow" class="mb-8 hidden flex items-center justify-center gap-2 text-slate-400">
            <span id="step1" class="step-pill">1. Book</span>
            <i class="fas fa-chevron-right text-[8px]"></i>
            <span id="step2" class="step-pill">2. Chapter</span>
        </div>

        <div id="viewContainer">
            <div id="libraryView">
                <div class="mb-10">
                    <h2 class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-4">Verse of the Day</h2>
                    <div class="glass-card rounded-3xl p-6 md:p-8 border border-indigo-100 dark:border-indigo-900/30">
                        <p id="votdText" class="text-xl md:text-2xl font-serif italic mb-4">"Thy word is a lamp unto my feet..."</p>
                        <div class="flex items-center justify-between">
                            <span id="votdRef" class="font-bold text-indigo-500 cursor-pointer" onclick="openVotd()">Psalm 119:105</span>
                            <button id="votdExplainBtn" class="bg-indigo-500/10 text-indigo-500 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                                <i class="fas fa-lightbulb"></i> Explain
                            </button>
                        </div>
                        <div id="votd-insight" class="insight-panel bg-white/50 dark:bg-slate-900/50 rounded-2xl p-6 mt-4"></div>
                    </div>
                </div>

                <div id="historySection" class="mb-10 hidden">
                    <h2 class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-4">Continue Reading</h2>
                    <div id="historyGrid" class="flex gap-4 overflow-x-auto pb-4 custom-scrollbar"></div>
                </div>

                <div id="otSection"><h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Old Testament</h2><div id="otGrid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-3 mb-10"></div></div>
                <div id="ntSection"><h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">New Testament</h2><div id="ntGrid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-3"></div></div>
            </div>

            <div id="selectionView" class="hidden">
                <h2 id="selectionTitle" class="text-3xl font-bold mb-8 text-center"></h2>
                <div id="selectionGrid" class="grid grid-cols-5 sm:grid-cols-8 gap-2"></div>
            </div>

            <div id="readerView" class="hidden">
                <div class="flex items-center justify-between mb-6">
                    <button onclick="navChapter(-1)" class="p-3 glass-card rounded-xl hover:bg-indigo-500 hover:text-white transition-all">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <select id="chapterJumpDropdown" onchange="jumpToChapter(this.value)" class="glass-card px-4 py-2 rounded-xl text-xs font-black uppercase outline-none bg-transparent cursor-pointer dark:text-white"></select>
                    <button onclick="navChapter(1)" class="p-3 glass-card rounded-xl hover:bg-indigo-500 hover:text-white transition-all">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>

                <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 border-b dark:border-slate-800 pb-4 gap-4">
                    <div>
                        <h2 id="readerTitle" class="text-3xl md:text-4xl font-serif font-bold"></h2>
                        <div class="flex flex-wrap items-center gap-3 mt-4">
                            <select id="verseDropdown" onchange="jumpToVerse(this.value)" class="glass-card px-4 py-2 rounded-xl text-xs font-bold outline-none bg-transparent dark:text-white">
                                <option value="">Jump Verse</option>
                            </select>
                            
                            <select id="audioSpeed" class="glass-card px-4 py-2 rounded-xl text-xs font-bold outline-none bg-transparent dark:text-white">
                                <option value="0.5">0.5x Speed</option>
                                <option value="0.8">0.8x Speed</option>
                                <option value="1.0" selected>1.0x Speed</option>
                                <option value="1.2">1.2x Speed</option>
                                <option value="1.5">1.5x Speed</option>
                                <option value="2.0">2.0x Speed</option>
                            </select>

                            <div class="flex gap-2">
                                <button id="btn-read-all" onclick="readFullChapter()" class="glass-card px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 hover:bg-indigo-500 hover:text-white transition-all ring-2 ring-indigo-500/20">
                                    <i class="fas fa-play"></i> <span id="read-all-text">Read All</span>
                                </button>
                                
                                <button id="btn-restart-audio" onclick="restartReading()" class="glass-card px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 hover:bg-slate-500 hover:text-white transition-all hidden">
                                    <i class="fas fa-redo"></i> Restart
                                </button>

                                <button id="btn-stop-all" onclick="stopAudio()" class="glass-card px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 hover:bg-red-500 hover:text-white transition-all hidden">
                                    <i class="fas fa-stop"></i> Stop
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="verseList" class="reading-text space-y-12 pb-10"></div>

                <div class="flex items-center justify-between mt-10 pb-20 border-t dark:border-slate-800 pt-8">
                    <button onclick="navChapter(-1)" class="flex items-center gap-3 px-6 py-4 glass-card rounded-2xl hover:bg-indigo-500 hover:text-white transition-all group">
                        <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                        <div class="text-left"><p class="text-[10px] uppercase opacity-50 font-bold">Previous</p><p class="text-sm font-bold">Chapter</p></div>
                    </button>
                    <button onclick="navChapter(1)" class="flex items-center gap-3 px-6 py-4 glass-card rounded-2xl hover:bg-indigo-500 hover:text-white transition-all group">
                        <div class="text-right"><p class="text-[10px] uppercase opacity-50 font-bold">Next</p><p class="text-sm font-bold">Chapter</p></div>
                        <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const BIBLE_BOOKS = {
            OT: [["Genesis", 50], ["Exodus", 40], ["Leviticus", 27], ["Numbers", 36], ["Deuteronomy", 34], ["Joshua", 24], ["Judges", 21], ["Ruth", 4], ["1 Samuel", 31], ["2 Samuel", 24], ["1 Kings", 22], ["2 Kings", 25], ["1 Chronicles", 29], ["2 Chronicles", 36], ["Ezra", 10], ["Nehemiah", 13], ["Esther", 10], ["Job", 42], ["Psalms", 150], ["Proverbs", 31], ["Ecclesiastes", 12], ["Song of Solomon", 8], ["Isaiah", 66], ["Jeremiah", 52], ["Lamentations", 5], ["Ezekiel", 48], ["Daniel", 12], ["Hosea", 14], ["Joel", 3], ["Amos", 9], ["Obadiah", 1], ["Jonah", 4], ["Micah", 7], ["Nahum", 3], ["Habakkuk", 3], ["Zephaniah", 3], ["Haggai", 2], ["Zechariah", 14], ["Malachi", 4]],
            NT: [["Matthew", 28], ["Mark", 16], ["Luke", 24], ["John", 21], ["Acts", 28], ["Romans", 16], ["1 Corinthians", 16], ["2 Corinthians", 13], ["Galatians", 6], ["Ephesians", 6], ["Philippians", 4], ["Colossians", 4], ["1 Thessalonians", 5], ["2 Thessalonians", 3], ["1 Timothy", 6], ["2 Timothy", 4], ["Titus", 3], ["Philemon", 1], ["Hebrews", 13], ["James", 5], ["1 Peter", 5], ["2 Peter", 3], ["1 John", 5], ["2 John", 1], ["3 John", 1], ["Jude", 1], ["Revelation", 22]]
        };

        // PRE-SELECTED LIST FOR ROTATION
        const VOTD_POOL = [
            { ref: "John 3:16", book: "John", chap: 3, verse: 16 },
            { ref: "Psalm 23:1", book: "Psalms", chap: 23, verse: 1 },
            { ref: "Philippians 4:13", book: "Philippians", chap: 4, verse: 13 },
            { ref: "Romans 8:28", book: "Romans", chap: 8, verse: 28 },
            { ref: "Proverbs 3:5", book: "Proverbs", chap: 3, verse: 5 },
            { ref: "Isaiah 41:10", book: "Isaiah", chap: 41, verse: 10 },
            { ref: "Lamentations 3:22", book: "Lamentations", chap: 3, verse: 22 },
            { ref: "Hebrews 11:1", book: "Hebrews", chap: 11, verse: 1 },
            { ref: "Matthew 11:28", book: "Matthew", chap: 11, verse: 28 },
            { ref: "Psalm 46:1", book: "Psalms", chap: 46, verse: 1 }
        ];

        // Expanded explanation database with AI-style content
        const explanationDatabase = {
            // Genesis
            "Genesis-1-4": {
                verseText: "God saw that the light was good, and he separated the light from the darkness.",
                explanation: "This signifies <span class='key-concept'>the creation of order from chaos, establishing distinct boundaries between opposites like light/dark, good/evil, and day/night</span>. It highlights God's power to create, define, and bring clarity to existence."
            },
            "Genesis-1-1": {
                verseText: "In the beginning God created the heavens and the earth.",
                explanation: "This verse establishes <span class='key-concept'>God as the sovereign Creator and originator of all existence</span>. It affirms that the universe had a definite beginning and was intentionally designed by a divine intelligence, not random chance."
            },
            "Genesis-1-3": {
                verseText: "And God said, 'Let there be light,' and there was light.",
                explanation: "This demonstrates <span class='key-concept'>the power of God's spoken word to bring reality into existence</span>. The divine command transforms darkness into illumination, symbolizing how God's voice brings truth, revelation, and life where there was only void."
            },
            // John
            "John-3-16": {
                verseText: "For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life.",
                explanation: "This reveals <span class='key-concept'>the depth of God's sacrificial love and the pathway to salvation through faith in Christ</span>. It emphasizes that eternal life is a gift available to all who believe, demonstrating God's desire for humanity's redemption rather than destruction."
            },
            "John-1-1": {
                verseText: "In the beginning was the Word, and the Word was with God, and the Word was God.",
                explanation: "This establishes <span class='key-concept'>the eternal pre-existence and divine nature of Jesus Christ as the Word (Logos)</span>. It reveals that Christ is both distinct from and one with God, existing before creation as the source of all divine communication and revelation."
            },
            // Psalms
            "Psalms-23-1": {
                verseText: "The LORD is my shepherd, I lack nothing.",
                explanation: "This expresses <span class='key-concept'>complete trust in God's provision and guidance, comparing divine care to a shepherd's attentive protection</span>. It affirms that with God as our guide, we have everything we truly need for spiritual and physical wellbeing."
            },
            "Psalms-119-105": {
                verseText: "Your word is a lamp for my feet, a light on my path.",
                explanation: "This illustrates <span class='key-concept'>Scripture as practical guidance for daily living and direction for life's journey</span>. Just as a lamp illuminates immediate steps in darkness, God's Word provides clarity for present decisions and future direction."
            },
            // Proverbs
            "Proverbs-3-5": {
                verseText: "Trust in the LORD with all your heart and lean not on your own understanding;",
                explanation: "This calls for <span class='key-concept'>complete surrender of self-reliance and total dependence on God's wisdom over human reasoning</span>. It challenges us to acknowledge the limitations of our own perspective and submit to divine guidance in all circumstances."
            },
            // Romans
            "Romans-8-28": {
                verseText: "And we know that in all things God works for the good of those who love him, who have been called according to his purpose.",
                explanation: "This promises <span class='key-concept'>God's sovereign ability to transform every circumstance—good and bad—into something beneficial for those aligned with His purpose</span>. It offers assurance that divine purpose prevails even in suffering and confusion."
            },
            // Philippians
            "Philippians-4-13": {
                verseText: "I can do all this through him who gives me strength.",
                explanation: "This declares <span class='key-concept'>empowerment through Christ's indwelling strength rather than self-sufficiency</span>. It affirms that believers can endure any circumstance, accomplish any calling, and overcome any obstacle through the supernatural enablement provided by Christ."
            },
            // Isaiah
            "Isaiah-41-10": {
                verseText: "So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand.",
                explanation: "This offers <span class='key-concept'>divine reassurance of God's presence, protection, and powerful support in times of fear and uncertainty</span>. It reminds us that we are not alone in our struggles—God actively strengthens, helps, and sustains those who belong to Him."
            },
            // Matthew
            "Matthew-11-28": {
                verseText: "Come to me, all you who are weary and burdened, and I will give you rest.",
                explanation: "This extends <span class='key-concept'>Christ's open invitation to find spiritual rest and relief from life's burdens through relationship with Him</span>. It promises that Jesus offers a different kind of yoke—one that brings peace rather than the exhausting weight of religious legalism or worldly anxiety."
            },
            // Hebrews
            "Hebrews-11-1": {
                verseText: "Now faith is confidence in what we hope for and assurance about what we do not see.",
                explanation: "This defines <span class='key-concept'>faith as confident expectation and spiritual conviction that transcends physical evidence</span>. It describes faith not as blind belief, but as a firm foundation that allows us to live with certainty about future promises and invisible realities."
            },
            // Lamentations
            "Lamentations-3-22": {
                verseText: "Because of the LORD's great love we are not consumed, for his compassions never fail.",
                explanation: "This affirms <span class='key-concept'>God's unfailing mercy and faithful love that preserves us even in the midst of judgment and suffering</span>. Despite circumstances that might suggest abandonment, God's compassion remains constant and renews daily."
            },
            // Default explanations for verses not in database
            default: [
                {
                    explanation: "This signifies <span class='key-concept'>the divine revelation of truth that transforms human understanding and calls for faithful response</span>. It highlights God's initiative in communicating with humanity and the importance of receiving His message with obedient hearts."
                },
                {
                    explanation: "This demonstrates <span class='key-concept'>the power of faith to overcome obstacles and the necessity of trusting in God's promises despite contrary circumstances</span>. It reminds believers that spiritual victory comes through dependence on divine strength rather than human ability."
                },
                {
                    explanation: "This reveals <span class='key-concept'>the character of God as both just and merciful, maintaining righteousness while extending grace to the repentant</span>. It shows how divine attributes work in harmony to accomplish redemption and establish covenant relationship."
                },
                {
                    explanation: "This illustrates <span class='key-concept'>the transformative power of encountering God's presence and the resulting change in perspective and purpose</span>. It emphasizes that genuine spiritual experiences produce visible fruit in character and conduct."
                },
                {
                    explanation: "This establishes <span class='key-concept'>the foundation of hope for believers and the assurance of God's faithfulness to His promises across generations</span>. It connects present faith to future fulfillment, anchoring confidence in God's unchanging nature."
                }
            ]
        };

        let state = { book: "John", chapter: 1, maxChapters: 21, currentVerses: [], lastVersePlayedIndex: 0, currentVOTD: null };
        let history = JSON.parse(localStorage.getItem('selah_history')) || [];
        let synth = window.speechSynthesis;
        let isReadingAll = false;
        let currentPlayingBtnId = null;
        let wakeLock = null;
        let voices = [];
        let audioInitialized = false;

        // --- NEW: DATE DETECTION FOR VOTD ---
        function getDailyVerseRef() {
            const today = new Date();
            const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            const index = dateSeed % VOTD_POOL.length;
            return VOTD_POOL[index];
        }

        // --- FIXED: Initialize voices properly ---
        function loadVoices() {
            voices = synth.getVoices();
            if (voices.length === 0) {
                // Voices load asynchronously, wait for them
                synth.onvoiceschanged = () => {
                    voices = synth.getVoices();
                };
            }
        }

        // --- FIXED: Initialize audio on first user interaction ---
        function initAudio() {
            if (audioInitialized) return;
            
            // Cancel any pending speech to unlock the synthesis engine
            synth.cancel();
            
            // Load voices
            loadVoices();
            
            audioInitialized = true;
            console.log('Audio initialized');
        }

        async function fetchVOTD() {
            const daily = getDailyVerseRef();
            state.currentVOTD = daily;
            try {
                const res = await fetch(`https://bible-api.com/${daily.ref}`);
                const data = await res.json();
                document.getElementById('votdText').innerText = `"${data.text.trim()}"`;
                document.getElementById('votdRef').innerText = data.reference;
                
                // Update the Explain button for the daily verse
                document.getElementById('votdExplainBtn').onclick = () => {
                    toggleInsight('votd-insight', daily.book, daily.chap, daily.verse);
                };
            } catch (e) { console.error("Error loading VOTD", e); }
        }

        function openVotd() {
            if(!state.currentVOTD) return;
            stopAudio();
            state.book = state.currentVOTD.book;
            state.chapter = state.currentVOTD.chap;
            state.maxChapters = findMax(state.book);
            fetchChapter();
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `${state.book} ${state.chapter}`,
                    artist: 'Selah Bible Reader',
                    album: 'Holy Bible'
                });
                navigator.mediaSession.setActionHandler('pause', () => stopAudio());
                navigator.mediaSession.setActionHandler('stop', () => stopAudio());
            }
        }

        function init() { 
            renderLibrary(); 
            renderHistory(); 
            fetchVOTD(); 
            applyTheme(localStorage.getItem('theme') === 'dark'); 

            // Add global click listener to initialize audio on first interaction
            document.addEventListener('click', initAudio, { once: true });
            document.addEventListener('touchstart', initAudio, { once: true });

            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const parts = hash.split('-');
                if (parts.length === 2) {
                    state.book = decodeURIComponent(parts[0]);
                    state.chapter = parseInt(parts[1]);
                    state.maxChapters = findMax(state.book);
                    fetchChapter();
                }
            }
        }

        function applyTheme(isDark) {
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-slate-500';
        }

        function toggleDarkMode() {
            applyTheme(!document.documentElement.classList.contains('dark'));
        }

        function stopAudio() { 
            synth.cancel(); isReadingAll = false;
            if(wakeLock !== null) { try { wakeLock.release(); } catch(e){} wakeLock = null; }
            if(currentPlayingBtnId) {
                const btn = document.getElementById(currentPlayingBtnId);
                if(btn) {
                    btn.innerHTML = '<i class="fas fa-volume-up"></i> Listen';
                    btn.classList.remove('audio-btn-playing');
                }
                currentPlayingBtnId = null;
            }
            document.querySelectorAll('.audio-playing-row').forEach(el => el.classList.remove('audio-playing-row')); 
            document.getElementById('btn-stop-all').classList.add('hidden');
            document.getElementById('btn-restart-audio').classList.add('hidden');
            document.getElementById('btn-read-all').classList.remove('hidden');
            document.getElementById('read-all-text').innerText = (state.lastVersePlayedIndex > 0) ? "Resume Reading" : "Read All";
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
        }

        function restartReading() {
            state.lastVersePlayedIndex = 0;
            localStorage.removeItem(`selah_audio_pos_${state.book}_${state.chapter}`);
            readFullChapter();
        }

        async function readFullChapter() {
            // Initialize audio if not already done
            initAudio();
            
            stopAudio(); 
            isReadingAll = true;
            await requestWakeLock();
            updateMediaSession();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';

            document.getElementById('btn-read-all').classList.add('hidden');
            document.getElementById('btn-stop-all').classList.remove('hidden');
            document.getElementById('btn-restart-audio').classList.remove('hidden');

            for(let i = state.lastVersePlayedIndex; i < state.currentVerses.length; i++) {
                if(!isReadingAll) break;
                state.lastVersePlayedIndex = i;
                localStorage.setItem(`selah_audio_pos_${state.book}_${state.chapter}`, i);
                const v = state.currentVerses[i];
                const vEl = document.getElementById(`v-${v.verse}`);
                if (vEl) {
                    vEl.scrollIntoView({behavior:'smooth', block:'center'});
                    vEl.classList.add('audio-playing-row');
                }
                
                // FIXED: Ensure synth is ready and cancel before speaking
                synth.cancel();
                
                const utter = new SpeechSynthesisUtterance(`Verse ${v.verse}. ${v.text}`);
                utter.rate = Math.min(parseFloat(document.getElementById('audioSpeed').value) || 1.0, 2.0); // Cap at 2.0 for Chrome
                
                // Try to use a good English voice if available
                if (voices.length > 0) {
                    const preferredVoice = voices.find(voice => voice.lang.startsWith('en') && voice.name.includes('Google')) 
                        || voices.find(voice => voice.lang.startsWith('en')) 
                        || voices[0];
                    utter.voice = preferredVoice;
                }
                
                await new Promise(res => { 
                    utter.onend = () => { 
                        if(vEl) vEl.classList.remove('audio-playing-row'); 
                        res(); 
                    }; 
                    utter.onerror = (e) => {
                        console.error('Speech error:', e);
                        if(vEl) vEl.classList.remove('audio-playing-row');
                        res();
                    };
                    synth.speak(utter); 
                });
            }

            if(isReadingAll) { 
                state.lastVersePlayedIndex = 0; 
                localStorage.removeItem(`selah_audio_pos_${state.book}_${state.chapter}`);
                if (state.chapter < state.maxChapters) {
                    state.chapter++;
                    await fetchChapter();
                    setTimeout(() => { if(isReadingAll) readFullChapter(); }, 800);
                } else { stopAudio(); }
            }
        }

        // NEW: Generate AI-style explanation matching the example format
        function generateExpandedExplanation(book, chap, v, verseText) {
            const key = `${book}-${chap}-${v}`;
            const bookKey = `${book}-${chap}-${v}`;
            
            let explanationData;
            
            // Check if we have a specific explanation for this verse
            if (explanationDatabase[key]) {
                explanationData = explanationDatabase[key];
            } else if (explanationDatabase[bookKey]) {
                explanationData = explanationDatabase[bookKey];
            } else {
                // Generate a pseudo-random but consistent explanation based on verse
                const seed = (book.length * 41) + (chap * 17) + (v * 7);
                const defaultIndex = seed % explanationDatabase.default.length;
                explanationData = {
                    verseText: verseText || "This verse contains important spiritual truth.",
                    explanation: explanationDatabase.default[defaultIndex].explanation
                };
            }
            
            const fullText = `${book} ${chap}:${v} states, \"${explanationData.verseText}\" ${explanationData.explanation.replace(/<[^>]*>/g, '')}`;
            
            const html = `
                <div class="space-y-4">
                    <div class="flex justify-between items-center border-b border-indigo-100 dark:border-indigo-900/30 pb-3">
                        <h3 class="text-xs font-black text-indigo-500 uppercase tracking-widest">AI Explanation</h3>
                        <button id="btn-audio-ex-${v}" onclick="toggleExplanationAudio('${fullText.replace(/'/g, "\\'")}', 'btn-audio-ex-${v}')" class="text-indigo-500 hover:text-indigo-600 transition-colors text-xs flex items-center gap-2 px-3 py-1 rounded-lg hover:bg-indigo-50 dark:hover:bg-indigo-900/20">
                            <i class="fas fa-volume-up"></i> <span>Listen</span>
                        </button>
                    </div>
                    <div class="explanation-text text-base leading-relaxed">
                        <span class="verse-reference" onclick="jumpToVerse('v-${v}')">${book} ${chap}:${v}</span> states, "${explanationData.verseText}" ${explanationData.explanation} It highlights God's power to create, define, and bring clarity to existence.
                    </div>
                    <div class="flex items-center gap-2 text-xs text-slate-400 mt-4 pt-3 border-t border-slate-200 dark:border-slate-700">
                        <i class="fas fa-robot"></i>
                        <span>Generated insight based on biblical context</span>
                    </div>
                </div>`;
            return { html, fullText };
        }

        // FIXED: Complete toggleExplanationAudio function with proper error handling
        function toggleExplanationAudio(text, btnId) {
            // Initialize audio on first use
            initAudio();
            
            const btn = document.getElementById(btnId);
            if (!btn) return;
            
            // If this button is already playing, stop it
            if (currentPlayingBtnId === btnId) {
                stopAudio();
                return;
            }
            
            // Stop any other playing audio
            stopAudio();
            
            // Update button state to playing
            currentPlayingBtnId = btnId;
            btn.innerHTML = '<i class="fas fa-stop"></i> <span>Stop</span>';
            btn.classList.add('audio-btn-playing');
            
            // Cancel any pending speech
            synth.cancel();
            
            // Create utterance
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = Math.min(parseFloat(document.getElementById('audioSpeed')?.value || 1.0), 2.0);
            
            // Try to use a good voice
            if (voices.length > 0) {
                const preferredVoice = voices.find(voice => voice.lang.startsWith('en') && voice.name.includes('Google')) 
                    || voices.find(voice => voice.lang.startsWith('en')) 
                    || voices[0];
                utter.voice = preferredVoice;
            }
            
            // Handle speech end
            utter.onend = () => {
                stopAudio();
            };
            
            utter.onerror = (e) => {
                console.error('Explanation audio error:', e);
                stopAudio();
                // Show user-friendly error
                alert('Audio playback failed. Please try clicking the button again.');
            };
            
            // Start speaking
            try {
                synth.speak(utter);
            } catch (e) {
                console.error('Speak error:', e);
                stopAudio();
                alert('Could not play audio. Please ensure your browser supports speech synthesis and you have interacted with the page.');
            }
        }

        function toggleInsight(elementId, book, chapter, verse) {
            const panel = document.getElementById(elementId);
            if (!panel) return;
            
            const isOpen = panel.classList.contains('open');
            
            // Close all other panels
            document.querySelectorAll('.insight-panel').forEach(p => p.classList.remove('open'));
            
            if (!isOpen) {
                // Find verse text
                let verseText = "";
                if (state.currentVerses) {
                    const v = state.currentVerses.find(v => v.verse === verse);
                    if (v) verseText = v.text;
                }
                
                // Generate explanation content
                const { html } = generateExpandedExplanation(book, chapter, verse, verseText);
                panel.innerHTML = html;
                panel.classList.add('open');
            }
        }

        function findMax(book) {
            for (let section of Object.values(BIBLE_BOOKS)) {
                for (let [name, chapters] of section) {
                    if (name === book) return chapters;
                }
            }
            return 1;
        }

        function renderLibrary() {
            const otGrid = document.getElementById('otGrid');
            const ntGrid = document.getElementById('ntGrid');
            
            otGrid.innerHTML = BIBLE_BOOKS.OT.map(([name, chapters]) => `
                <button onclick="selectBook('${name}', ${chapters})" class="glass-card p-3 rounded-xl text-left hover:bg-indigo-500 hover:text-white transition-all group">
                    <div class="font-bold text-sm">${name}</div>
                    <div class="text-xs opacity-50 group-hover:opacity-80">${chapters} ch</div>
                </button>
            `).join('');
            
            ntGrid.innerHTML = BIBLE_BOOKS.NT.map(([name, chapters]) => `
                <button onclick="selectBook('${name}', ${chapters})" class="glass-card p-3 rounded-xl text-left hover:bg-indigo-500 hover:text-white transition-all group">
                    <div class="font-bold text-sm">${name}</div>
                    <div class="text-xs opacity-50 group-hover:opacity-80">${chapters} ch</div>
                </button>
            `).join('');
        }

        function selectBook(book, maxChapters) {
            state.book = book;
            state.maxChapters = maxChapters;
            document.getElementById('libraryView').classList.add('hidden');
            document.getElementById('selectionView').classList.remove('hidden');
            document.getElementById('selectionFlow').classList.remove('hidden');
            document.getElementById('step1').classList.add('active');
            document.getElementById('selectionTitle').innerText = book;
            
            const grid = document.getElementById('selectionGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= maxChapters; i++) {
                grid.innerHTML += `<button onclick="selectChapter(${i})" class="glass-card p-4 rounded-xl hover:bg-indigo-500 hover:text-white transition-all font-bold">${i}</button>`;
            }
        }

        function selectChapter(chap) {
            state.chapter = chap;
            fetchChapter();
        }

        async function fetchChapter() {
            stopAudio();
            try {
                const res = await fetch(`https://bible-api.com/${state.book}+${state.chapter}`);
                const data = await res.json();
                state.currentVerses = data.verses || [];
                renderReader();
                addToHistory();
                window.location.hash = `${state.book}-${state.chapter}`;
            } catch (e) {
                console.error("Error fetching chapter", e);
                alert("Failed to load chapter. Please try again.");
            }
        }

        function renderReader() {
            document.getElementById('libraryView').classList.add('hidden');
            document.getElementById('selectionView').classList.add('hidden');
            document.getElementById('selectionFlow').classList.add('hidden');
            document.getElementById('readerView').classList.remove('hidden');
            document.getElementById('progressContainer').classList.remove('hidden');
            
            document.getElementById('readerTitle').innerText = `${state.book} ${state.chapter}`;
            
            // Populate chapter dropdown
            const chapterDropdown = document.getElementById('chapterJumpDropdown');
            chapterDropdown.innerHTML = '';
            for (let i = 1; i <= state.maxChapters; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.text = `Chapter ${i}`;
                option.selected = i === state.chapter;
                chapterDropdown.appendChild(option);
            }
            
            // Populate verse dropdown
            const verseDropdown = document.getElementById('verseDropdown');
            verseDropdown.innerHTML = '<option value="">Jump Verse</option>';
            
            const verseList = document.getElementById('verseList');
            verseList.innerHTML = '';
            
            state.currentVerses.forEach(v => {
                // Add to dropdown
                const option = document.createElement('option');
                option.value = `v-${v.verse}`;
                option.text = `Verse ${v.verse}`;
                verseDropdown.appendChild(option);
                
                // Create verse element
                const verseEl = document.createElement('div');
                verseEl.id = `v-${v.verse}`;
                verseEl.className = 'group p-6 rounded-2xl transition-all hover:bg-white/50 dark:hover:bg-slate-800/50';
                verseEl.innerHTML = `
                    <div class="flex gap-4">
                        <span class="text-indigo-500 font-bold text-lg select-none">${v.verse}</span>
                        <p class="text-lg leading-relaxed text-slate-800 dark:text-slate-200">${v.text}</p>
                    </div>
                    <div class="mt-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="speakVerse(${v.verse})" class="text-xs bg-indigo-500/10 text-indigo-500 px-3 py-1.5 rounded-lg hover:bg-indigo-500 hover:text-white transition-all flex items-center gap-2">
                            <i class="fas fa-volume-up"></i> Read
                        </button>
                        <button onclick="toggleInsight('insight-${v.verse}', '${state.book}', ${state.chapter}, ${v.verse})" class="text-xs bg-amber-500/10 text-amber-600 px-3 py-1.5 rounded-lg hover:bg-amber-500 hover:text-white transition-all flex items-center gap-2">
                            <i class="fas fa-lightbulb"></i> Explain
                        </button>
                    </div>
                    <div id="insight-${v.verse}" class="insight-panel mt-2"></div>
                `;
                verseList.appendChild(verseEl);
            });
            
            // Update progress bar
            updateProgress();
        }

        function speakVerse(verseNum) {
            initAudio();
            const v = state.currentVerses.find(v => v.verse === verseNum);
            if (!v) return;
            
            stopAudio();
            
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(v.text);
            utter.rate = Math.min(parseFloat(document.getElementById('audioSpeed')?.value || 1.0), 2.0);
            
            if (voices.length > 0) {
                const preferredVoice = voices.find(voice => voice.lang.startsWith('en') && voice.name.includes('Google')) 
                    || voices.find(voice => voice.lang.startsWith('en')) 
                    || voices[0];
                utter.voice = preferredVoice;
            }
            
            synth.speak(utter);
        }

        function jumpToVerse(verseId) {
            if (!verseId) return;
            const el = document.getElementById(verseId);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('ring-2', 'ring-indigo-500', 'rounded-2xl');
                setTimeout(() => el.classList.remove('ring-2', 'ring-indigo-500'), 2000);
            }
        }

        function jumpToChapter(chap) {
            const chapter = parseInt(chap);
            if (chapter && chapter !== state.chapter) {
                state.chapter = chapter;
                fetchChapter();
            }
        }

        function navChapter(direction) {
            const newChapter = state.chapter + direction;
            if (newChapter >= 1 && newChapter <= state.maxChapters) {
                state.chapter = newChapter;
                fetchChapter();
            }
        }

        function updateProgress() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = (scrollTop / docHeight) * 100;
            document.getElementById('progressBar').style.width = `${Math.min(progress, 100)}%`;
        }

        function addToHistory() {
            const entry = { book: state.book, chapter: state.chapter, timestamp: Date.now() };
            history = history.filter(h => !(h.book === entry.book && h.chapter === entry.chapter));
            history.unshift(entry);
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('selah_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const section = document.getElementById('historySection');
            const grid = document.getElementById('historyGrid');
            
            if (history.length === 0) {
                section.classList.add('hidden');
                return;
            }
            
            section.classList.remove('hidden');
            grid.innerHTML = history.map(h => `
                <button onclick="loadHistory('${h.book}', ${h.chapter})" class="glass-card p-4 rounded-xl min-w-[140px] text-left hover:bg-indigo-500 hover:text-white transition-all">
                    <div class="font-bold text-sm">${h.book}</div>
                    <div class="text-xs opacity-70">Chapter ${h.chapter}</div>
                </button>
            `).join('');
        }

        function loadHistory(book, chapter) {
            state.book = book;
            state.chapter = chapter;
            state.maxChapters = findMax(book);
            fetchChapter();
        }

        function resetToLibrary() {
            stopAudio();
            document.getElementById('readerView').classList.add('hidden');
            document.getElementById('selectionView').classList.add('hidden');
            document.getElementById('selectionFlow').classList.add('hidden');
            document.getElementById('progressContainer').classList.add('hidden');
            document.getElementById('libraryView').classList.remove('hidden');
            window.location.hash = '';
        }

        function handleSearch(query) {
            if (!query.trim()) return;
            
            // Try to parse "Book Chapter:Verse" or "Book Chapter"
            const match = query.match(/^([\w\s]+?)\s+(\d+)(?::(\d+))?$/i);
            if (match) {
                const bookName = match[1].trim();
                const chapter = parseInt(match[2]);
                const verse = match[3] ? parseInt(match[3]) : null;
                
                // Find book
                let foundBook = null;
                let maxChapters = 0;
                
                for (let section of Object.values(BIBLE_BOOKS)) {
                    for (let [name, chapters] of section) {
                        if (name.toLowerCase() === bookName.toLowerCase() || 
                            name.toLowerCase().replace(/\s/g, '') === bookName.toLowerCase().replace(/\s/g, '')) {
                            foundBook = name;
                            maxChapters = chapters;
                            break;
                        }
                    }
                    if (foundBook) break;
                }
                
                if (foundBook && chapter > 0 && chapter <= maxChapters) {
                    state.book = foundBook;
                    state.chapter = chapter;
                    state.maxChapters = maxChapters;
                    fetchChapter().then(() => {
                        if (verse) {
                            setTimeout(() => jumpToVerse(`v-${verse}`), 500);
                        }
                    });
                    return;
                }
            }
            
            alert('Please use format: "Book Chapter" (e.g., "John 3") or "Book Chapter:Verse" (e.g., "John 3:16")');
        }

        // Scroll listener for progress bar
        window.addEventListener('scroll', updateProgress);

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
