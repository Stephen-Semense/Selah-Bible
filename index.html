<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Selah Bible | Deep Insight Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    screens: {
                        'xs': '375px',
                        'sm': '640px',
                        'md': '768px',
                        'lg': '1024px',
                        'xl': '1280px',
                        '2xl': '1536px',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;700&display=swap');
        
        :root { 
            --font-main: 'Plus Jakarta Sans', sans-serif; 
            --font-reading: 'Lora', serif; 
            --font-display: 'Cinzel', serif;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        html {
            font-size: 14px;
            -webkit-text-size-adjust: 100%;
        }
        
        @media (min-width: 640px) {
            html { font-size: 15px; }
        }
        
        @media (min-width: 1024px) {
            html { font-size: 16px; }
        }
        
        body { 
            font-family: var(--font-main); 
            transition: background-color 0.4s; 
            overflow-x: hidden; 
            min-height: 100vh;
            width: 100%;
            max-width: 100vw;
        }
        
        .reading-text { font-family: var(--font-reading); }
        .display-font { font-family: var(--font-display); }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
        }
        
        .dark .glass-card { 
            background: rgba(15, 23, 42, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .insight-panel { 
            max-height: 0; 
            overflow: hidden; 
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0; 
        }
        
        .insight-panel.open { 
            max-height: 2500px; 
            opacity: 1; 
            margin-top: 1rem; 
            border-left: 3px solid #6366f1; 
            padding-left: 1rem; 
        }
        
        @media (min-width: 640px) {
            .insight-panel.open {
                margin-top: 1.5rem;
                border-left-width: 4px;
                padding-left: 1.5rem;
            }
        }
        
        .step-pill { 
            opacity: 0.4; 
            font-size: 0.625rem;
            font-weight: 800; 
            text-transform: uppercase; 
            transition: all 0.3s; 
            padding: 0.25rem 0.5rem;
        }
        
        @media (min-width: 640px) {
            .step-pill {
                font-size: 0.75rem;
                padding: 0.5rem 1rem;
            }
        }
        
        .step-pill.active { 
            background: #6366f1; 
            color: white; 
            opacity: 1; 
            border-radius: 99px; 
        }
        
        .aurora-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            background: #fdfeff; 
        }
        
        .dark .aurora-bg { 
            background: #020617; 
        }
        
        @keyframes pulse-audio {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); background: rgba(99, 102, 241, 0.08); }
            100% { transform: scale(1); }
        }
        
        .audio-playing-row { 
            animation: pulse-audio 1.5s infinite; 
            border-radius: 1rem; 
            border: 1px solid rgba(99, 102, 241, 0.2); 
        }
        
        @media (min-width: 640px) {
            .audio-playing-row {
                border-radius: 1.5rem;
            }
        }
        
        .verse-reference { 
            color: #6366f1; 
            font-weight: 600; 
            text-decoration: underline; 
            cursor: pointer; 
            transition: color 0.2s; 
        }
        
        .verse-reference:hover { color: #4f46e5; }
        
        .key-concept { 
            background: rgba(99, 102, 241, 0.15); 
            padding: 0.125rem 0.375rem; 
            border-radius: 4px; 
            font-weight: 500; 
            transition: background 0.2s; 
            font-size: 0.9em;
        }
        
        .key-concept:hover { background: rgba(99, 102, 241, 0.25); }
        
        .explanation-text { 
            line-height: 1.7; 
            color: #334155;
            font-size: 0.95rem;
        }
        
        @media (min-width: 640px) {
            .explanation-text {
                line-height: 1.8;
                font-size: 1rem;
            }
        }
        
        .dark .explanation-text { color: #cbd5e1; }
        
        .audio-btn-playing { 
            color: #6366f1; 
            animation: pulse 1.5s infinite; 
            background: rgba(99, 102, 241, 0.1) !important; 
        }
        
        .audio-btn-loading { 
            opacity: 0.5; 
            pointer-events: none; 
        }
        
        .listen-btn { 
            transition: all 0.3s ease; 
            display: inline-flex; 
            align-items: center; 
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            color: #6366f1;
        }
        
        .listen-btn:hover { 
            background: rgba(99, 102, 241, 0.2); 
            transform: translateY(-1px);
        }
        
        .listen-btn:active { transform: translateY(0); }
        
        .listen-btn.playing { 
            background: #6366f1; 
            color: white; 
            animation: pulse-listen 2s infinite;
        }
        
        @keyframes pulse-listen {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(99, 102, 241, 0); }
        }
        
        .audio-bars { 
            display: flex; 
            align-items: center; 
            gap: 2px; 
            height: 12px; 
        }
        
        .audio-bar { 
            width: 2px; 
            background: currentColor; 
            border-radius: 1px; 
            animation: sound-bars 0.5s ease-in-out infinite alternate; 
        }
        
        .audio-bar:nth-child(1) { height: 4px; animation-delay: 0s; }
        .audio-bar:nth-child(2) { height: 8px; animation-delay: 0.1s; }
        .audio-bar:nth-child(3) { height: 6px; animation-delay: 0.2s; }
        .audio-bar:nth-child(4) { height: 10px; animation-delay: 0.3s; }
        
        @keyframes sound-bars {
            0% { transform: scaleY(0.5); opacity: 0.5; }
            100% { transform: scaleY(1); opacity: 1; }
        }
        
        .insight-header { 
            display: flex; 
            justify-content: flex-start; 
            align-items: center; 
            border-bottom: 1px solid rgba(99, 102, 241, 0.2); 
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
        }
        
        @media (min-width: 640px) {
            .insight-header {
                padding-bottom: 0.75rem;
                margin-bottom: 1rem;
            }
        }
        
        .insight-title { 
            font-size: 0.7rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            color: #6366f1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        @media (min-width: 640px) {
            .insight-title {
                font-size: 0.75rem;
            }
        }
        
        .insight-footer {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.75rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        @media (min-width: 640px) {
            .insight-footer {
                font-size: 0.75rem;
                margin-top: 1rem;
                padding-top: 0.75rem;
            }
        }
        
        .custom-scrollbar::-webkit-scrollbar { 
            height: 4px; 
            width: 4px;
        }
        
        @media (min-width: 640px) {
            .custom-scrollbar::-webkit-scrollbar {
                height: 6px;
                width: 6px;
            }
        }
        
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: rgba(99, 102, 241, 0.3); 
            border-radius: 3px; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { 
            background: rgba(99, 102, 241, 0.5); 
        }
        
        .toast {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 0.625rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 90vw;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        @media (min-width: 640px) {
            .toast {
                bottom: 2rem;
                padding: 0.75rem 1.5rem;
            }
        }
        
        .toast.show { 
            transform: translateX(-50%) translateY(0); 
            opacity: 1; 
        }
        
        .toast.error { background: #ef4444; }
        
        .progress-ring-container {
            position: relative;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }
        
        @media (min-width: 640px) {
            .progress-ring-container {
                width: 40px;
                height: 40px;
            }
        }
        
        .progress-ring-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }
        
        .progress-ring-bg {
            fill: none;
            stroke: rgba(99, 102, 241, 0.1);
            stroke-width: 3;
        }
        
        @media (min-width: 640px) {
            .progress-ring-bg {
                stroke-width: 4;
            }
        }
        
        .progress-ring-fill {
            fill: none;
            stroke: #6366f1;
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        
        @media (min-width: 640px) {
            .progress-ring-fill {
                stroke-width: 4;
            }
        }
        
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8px;
            font-weight: 700;
            color: #6366f1;
        }
        
        @media (min-width: 640px) {
            .progress-text {
                font-size: 10px;
            }
        }
        
        .dark .progress-text {
            color: #818cf8;
        }
        
        .history-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            min-width: 160px;
        }
        
        @media (min-width: 640px) {
            .history-card {
                gap: 12px;
                padding: 12px;
                min-width: 180px;
            }
        }
        
        .history-card-content {
            flex: 1;
            min-width: 0;
        }
        
        .history-book-name {
            font-weight: 700;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        @media (min-width: 640px) {
            .history-book-name {
                font-size: 0.875rem;
            }
        }
        
        .history-chapter-info {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 2px;
        }
        
        @media (min-width: 640px) {
            .history-chapter-info {
                font-size: 0.75rem;
            }
        }
        
        .history-progress-detail {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 2px;
        }
        
        @media (min-width: 640px) {
            .history-progress-detail {
                font-size: 0.65rem;
            }
        }
        
        .continue-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            min-width: 170px;
            text-align: left;
        }
        
        @media (min-width: 640px) {
            .continue-card {
                gap: 12px;
                padding: 16px;
                min-width: 200px;
            }
        }
        
        .continue-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6366f1;
            font-size: 0.875rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        @media (min-width: 640px) {
            .continue-icon {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }
        
        .continue-content {
            flex: 1;
            min-width: 0;
        }
        
        .continue-book {
            font-weight: 700;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        @media (min-width: 640px) {
            .continue-book {
                font-size: 0.9rem;
            }
        }
        
        .continue-chapter {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 2px;
        }
        
        @media (min-width: 640px) {
            .continue-chapter {
                font-size: 0.8rem;
            }
        }
        
        .continue-time {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-top: 4px;
        }
        
        @media (min-width: 640px) {
            .continue-time {
                font-size: 0.65rem;
            }
        }

        /* Professional Book Cover Styles */
        .book-cover-container {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        
        @media (min-width: 640px) {
            .book-cover-container {
                border-radius: 16px;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
        }
        
        .book-cover-container:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }
        
        @media (min-width: 640px) {
            .book-cover-container:hover {
                transform: translateY(-8px) scale(1.03);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            }
        }
        
        .book-cover-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.7) 100%);
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .book-cover-container:hover::before {
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.8) 100%);
        }
        
        .book-cover-art {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, opacity 0.4s ease;
            display: block;
            opacity: 0;
        }
        
        .book-cover-art.loaded {
            opacity: 1;
        }
        
        .book-cover-art.error {
            display: none !important;
        }
        
        .book-cover-container:hover .book-cover-art.loaded {
            transform: scale(1.1);
        }
        
        .book-cover-overlay {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1rem;
        }
        
        @media (min-width: 640px) {
            .book-cover-overlay {
                padding: 1.25rem;
            }
        }
        
        /* FIXED: Book title no longer cut off */
        .book-cover-title {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            line-height: 1.3;
            margin-bottom: 0.25rem;
            letter-spacing: 0.02em;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }
        
        @media (min-width: 375px) {
            .book-cover-title {
                font-size: 0.95rem;
            }
        }
        
        @media (min-width: 640px) {
            .book-cover-title {
                font-size: 1.1rem;
                margin-bottom: 0.375rem;
                line-height: 1.25;
            }
        }
        
        .book-cover-chapters {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        @media (min-width: 640px) {
            .book-cover-chapters {
                font-size: 0.875rem;
            }
        }
        
        .book-cover-badge {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 0.375rem 0.75rem;
            border-radius: 99px;
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            z-index: 4;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        @media (min-width: 640px) {
            .book-cover-badge {
                top: 1rem;
                right: 1rem;
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }
        }

        /* Professional Cover Modal */
        .cover-modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 1rem;
        }
        
        @media (min-width: 640px) {
            .cover-modal {
                padding: 2rem;
            }
        }
        
        .cover-modal.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .cover-modal-content {
            position: relative;
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        @media (min-width: 640px) {
            .cover-modal-content {
                max-width: 480px;
            }
        }
        
        .cover-modal.active .cover-modal-content {
            transform: scale(1) translateY(0);
        }
        
        .cover-modal-image-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        
        @media (min-width: 640px) {
            .cover-modal-image-wrapper {
                border-radius: 20px;
            }
        }
        
        .cover-modal-image {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .cover-modal-image.loaded {
            opacity: 1;
        }
        
        .cover-modal-image.error {
            display: none !important;
        }
        
        .cover-modal-image-fallback {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 6rem;
            font-weight: 700;
            color: rgba(255,255,255,0.2);
        }
        
        .cover-modal-info {
            text-align: center;
            margin-top: 1.5rem;
            color: white;
            width: 100%;
        }
        
        @media (min-width: 640px) {
            .cover-modal-info {
                margin-top: 2rem;
            }
        }
        
        .cover-modal-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }
        
        @media (min-width: 640px) {
            .cover-modal-title {
                font-size: 2.25rem;
                margin-bottom: 0.75rem;
            }
        }
        
        .cover-modal-subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 0.25rem;
        }
        
        @media (min-width: 640px) {
            .cover-modal-subtitle {
                font-size: 1.125rem;
            }
        }
        
        .cover-modal-tagline {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.5);
            font-style: italic;
            margin-bottom: 1.5rem;
        }
        
        @media (min-width: 640px) {
            .cover-modal-tagline {
                font-size: 1rem;
                margin-bottom: 2rem;
            }
        }
        
        .cover-modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            width: 100%;
        }
        
        @media (min-width: 640px) {
            .cover-modal-actions {
                gap: 1.25rem;
            }
        }
        
        .cover-modal-btn {
            padding: 0.875rem 2rem;
            border-radius: 99px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9375rem;
            flex: 1;
            justify-content: center;
            max-width: 200px;
        }
        
        @media (min-width: 640px) {
            .cover-modal-btn {
                padding: 1rem 2.5rem;
                font-size: 1rem;
                flex: 0 0 auto;
            }
        }
        
        .cover-modal-btn.primary {

            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
        
        .cover-modal-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .cover-modal-btn.secondary:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .cover-modal-close {
            position: absolute;
            top: -3rem;
            right: 0;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            background: none;
            border: none;
            padding: 0.5rem;

            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;

                top: -4rem;
                font-size: 1.75rem;
                width: 48px;
                height: 48px;
            }
        }
        
        .cover-modal-close:hover {
            opacity: 1;
            background: rgba(255,255,255,0.1);
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        @media (min-width: 375px) {
            .books-grid {
                gap: 1.25rem;
            }
        }
        
        @media (min-width: 640px) {
            .books-grid {
                grid-template-columns: repeat(3, 1fr);

            }

                grid-template-columns: repeat(4, 1fr);

                gap: 2rem;

            .books-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

            top: 0;

        .testament-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
        }
        
        @media (min-width: 640px) {
            .testament-divider {
                gap: 1.5rem;
                margin: 3rem 0 2rem;
            }

            height: 1px;
            background: linear-gradient(to right, transparent, rgba(99, 102, 241, 0.3), transparent);
        }
        
        .testament-title {
            font-family: var(--font-display);
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #6366f1;
            padding: 0.5rem 1.25rem;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 99px;
            white-space: nowrap;
        }
        
        @media (min-width: 640px) {
            .testament-title {
                font-size: 1rem;
                letter-spacing: 0.25em;
                padding: 0.625rem 1.5rem;
            }
        }

        /* Touch friendly improvements */
        @media (hover: none) {
            .book-cover-container:hover {
                transform: none;
            }
            .book-cover-container:active {
                transform: scale(0.98);
            }
        }

        /* Prevent text selection on UI elements */
        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Safe area insets for notched phones */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Horizontal scroll snap for mobile */
        .snap-x {
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        .snap-center {
            scroll-snap-align: center;
        }

        /* Reading view improvements */
        .verse-container {
            padding: 1.25rem;
            margin: 0 -0.5rem;
        }
        
        @media (min-width: 640px) {
            .verse-container {
                padding: 1.75rem;
                margin: 0;
                border-radius: 1rem;
            }
        }
        
        @media (min-width: 1024px) {
            .verse-container {
                padding: 2.25rem;
            }
        }

        /* Book initial letter for fallback */
        .book-initial {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 5rem;
            font-weight: 700;
            color: rgba(255,255,255,0.15);
            z-index: 1;
            pointer-events: none;
        }
        
        @media (min-width: 640px) {
            .book-initial {
                font-size: 6rem;
            }
        }

        /* Progress section - non-interactive hover only */
        .progress-card {
            cursor: default;
            pointer-events: none;
        }
        
        .progress-card:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        /* Authors Modal */
        .authors-modal {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .authors-modal.active {

        }
        
        .authors-content {
            background: white;

        }

            transform: scale(1);
        }
        
        .dark .authors-content {
            background: #1e293b;
            color: white;
        }
    </style>

        function updateMediaSession(title, artist = 'Selah Bible') {

                    album: 'Holy Bible'
                });
                navigator.mediaSession.setActionHandler('pause', stopAudio);
                navigator.mediaSession.setActionHandler('stop', stopAudio);
            }
        }

        function generateExpandedExplanation(book, chap, v, verseText) {
            const key = `${book}-${chap}-${v}`;
            
            let explanationData;
            if (explanationDatabase[key]) {
                explanationData = explanationDatabase[key];
            } else {
                const seed = (book.length * 41) + (chap * 17) + (v * 7);
                const defaultIndex = seed % explanationDatabase.default.length;
                explanationData = {
                    verseText: verseText || "This verse contains important spiritual truth.",
                    explanation: explanationDatabase.default[defaultIndex].explanation
                };
            }
            
            const html = `
                <div class="space-y-3 sm:space-y-4">
                    <div class="insight-header">
                        <h3 class="insight-title">
                            <i class="fas fa-robot"></i> AI Explanation
                        </h3>
                    </div>
                    <div class="explanation-text">
                        <span class="verse-reference" onclick="jumpToVerse('v-${v}')">${book} ${chap}:${v}</span> states, "${explanationData.verseText}" ${explanationData.explanation}
                    </div>
                    <div class="insight-footer">
                        <i class="fas fa-info-circle"></i>
                        <span>Generated insight based on biblical context</span>
                    </div>
                </div>`;
            
            return { html };
        }

        function toggleInsight(elementId, book, chapter, verse) {
            const panel = document.getElementById(elementId);
            if (!panel) return;
            
            const isOpen = panel.classList.contains('open');
            document.querySelectorAll('.insight-panel').forEach(p => p.classList.remove('open'));
            
            if (!isOpen) {
                let verseText = "";
                if (state.currentVerses) {
                    const v = state.currentVerses.find(v => v.verse === verse);
                    if (v) verseText = v.text;
                }
                
                const { html } = generateExpandedExplanation(book, chapter, verse, verseText);
                panel.innerHTML = html;
                panel.classList.add('open');
                
                setTimeout(() => {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            }
        }

        // FIXED: Read All function with proper resume support
        async function readFullChapter(startFromIndex = null) {
            initAudio();
            
            // FIXED: If no index provided, check for saved position
            if (startFromIndex === null) {
                const savedPosition = localStorage.getItem(`selah_audio_pos_${state.book}_${state.chapter}`);
                startFromIndex = savedPosition ? parseInt(savedPosition) : 0;
            }
            
            state.isAutoReading = true;
            isReadingAll = true;
            
            await requestWakeLock();
            updateMediaSession(`${state.book} ${state.chapter}`);
            
            // FIXED: Hide read all button, show restart and stop buttons
            document.getElementById('btn-read-all').classList.add('hidden');
            document.getElementById('btn-stop-all').classList.remove('hidden');
            document.getElementById('btn-restart-audio').classList.remove('hidden');

            for(let i = startFromIndex; i < state.currentVerses.length; i++) {
                if(!isReadingAll) break;
                
                state.lastVersePlayedIndex = i;
                localStorage.setItem(`selah_audio_pos_${state.book}_${state.chapter}`, i);
                
                const v = state.currentVerses[i];
                const vEl = document.getElementById(`v-${v.verse}`);
                
                if (vEl) {
                    vEl.scrollIntoView({behavior:'smooth', block:'center'});
                    vEl.classList.add('audio-playing-row');
                }
                
                synth.cancel();
                
                const utter = new SpeechSynthesisUtterance(`Verse ${v.verse}. ${v.text}`);
                utter.rate = Math.min(parseFloat(document.getElementById('audioSpeed').value) || 1.0, 2.0);
                
                const voice = getBestVoice();
                if (voice) utter.voice = voice;
                
                await new Promise(res => { 
                    utter.onend = () => { 
                        if(vEl) vEl.classList.remove('audio-playing-row'); 
                        res(); 
                    }; 
                    utter.onerror = (e) => {
                        if(vEl) vEl.classList.remove('audio-playing-row');
                        res();
                    };
                    synth.speak(utter); 
                });
            }

            if(isReadingAll && state.isAutoReading) { 
                if (state.chapter < state.maxChapters) {
                    state.lastVersePlayedIndex = 0; 
                    localStorage.removeItem(`selah_audio_pos_${state.book}_${state.chapter}`);
                    state.chapter++;
                    
                    showToast(`Continuing to Chapter ${state.chapter}...`);
                    
                    await fetchChapter(true);
                } else { 
                    state.lastVersePlayedIndex = 0; 
                    localStorage.removeItem(`selah_audio_pos_${state.book}_${state.chapter}`);
                    state.isAutoReading = false;
                    stopAudio(); 
                    showToast('Book complete!');
                }
            }
        }

        function restartReading() {
            synth.cancel();
            isReadingAll = false;
            state.isAutoReading = false;
            
            state.lastVersePlayedIndex = 0;
            localStorage.removeItem(`selah_audio_pos_${state.book}_${state.chapter}`);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            document.querySelectorAll('.audio-playing-row').forEach(el => el.classList.remove('audio-playing-row'));
            
            showToast('Restarting...');
            
            setTimeout(() => {
                readFullChapter(0);
            }, 300);
        }

        function speakVerse(verseNum) {
            initAudio();
            const v = state.currentVerses.find(v => v.verse === verseNum);
            if (!v) return;
            
            stopAudio();
            
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(v.text);
            utter.rate = Math.min(parseFloat(document.getElementById('audioSpeed')?.value || 1.0), 2.0);
            
            const voice = getBestVoice();
            if (voice) utter.voice = voice;
            
            synth.speak(utter);
        }

        function findMax(book) {
            for (let section of Object.values(BIBLE_BOOKS)) {
                for (let [name, chapters] of section) {
                    if (name === book) return chapters;
                }
            }
            return 1;
        }

        function getBookData(bookName) {
            for (let section of Object.values(BIBLE_BOOKS)) {
                for (let book of section) {
                    if (book[0] === bookName) return book;
                }
            }
            return null;
        }

        function loadImageWithFallback(imgElement, src, onLoadCallback, onErrorCallback) {
            const timeout = setTimeout(() => {
                if (!imgElement.classList.contains('loaded')) {
                    imgElement.classList.add('error');
                    if (onErrorCallback) onErrorCallback();
                }
            }, 8000);

            imgElement.onload = () => {
                clearTimeout(timeout);
                imgElement.classList.add('loaded');
                imgElement.classList.remove('error');
                imgElement.style.opacity = '1';
                if (onLoadCallback) onLoadCallback();
            };

            imgElement.onerror = () => {
                clearTimeout(timeout);
                imgElement.classList.add('error');
                imgElement.classList.remove('loaded');
                if (onErrorCallback) onErrorCallback();
            };

            imgElement.src = src + '?t=' + Date.now();
        }

            }
            
            document.getElementById('modalBookTitle').textContent = bookName;
            document.getElementById('modalBookInfo').textContent = `${chapters} Chapters`;
            document.getElementById('modalBookTagline').textContent = bookData ? bookData[3] : '';
            
            document.getElementById('modalReadBtn').onclick = () => {
                closeCoverModal();
                selectBook(bookName, chapters);
            };
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCoverModal(event) {
            if (event && event.target !== event.currentTarget && !event.target.closest('.cover-modal-close')) return;
            const modal = document.getElementById('coverModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
            
            const modalImg = document.getElementById('modalCoverImage');
            modalImg.src = '';
            modalImg.style.opacity = '0';
            modalImg.classList.remove('loaded', 'error');
        }

        function selectBook(book, maxChapters) {
            state.book = book;
            state.maxChapters = maxChapters;
            state.selectedBookData = getBookData(book);
            
            document.getElementById('libraryView').classList.add('hidden');
            document.getElementById('selectionView').classList.remove('hidden');
            document.getElementById('selectionFlow').classList.remove('hidden');
            document.getElementById('step1').classList.add('active');
            document.getElementById('selectionTitle').innerText = book;
            
            const coverUrl = BOOK_COVERS[book] || '';
            
            const coverDiv = document.getElementById('selectionBookCover');
            coverDiv.innerHTML = '';
            coverDiv.className = 'w-16 h-24 sm:w-24 sm:h-36 rounded-lg shadow-lg flex-shrink-0 overflow-hidden bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center';
            
            if (coverUrl) {
                const img = document.createElement('img');
                img.className = 'w-full h-full object-cover';
                img.alt = book;
                img.width = 200;
                img.height = 300;
                
                loadImageWithFallback(
                    img,
                    coverUrl,
                    null,
                    () => {
                        coverDiv.innerHTML = `<span class="text-white font-bold text-3xl">${book.charAt(0)}</span>`;
                    }
                );
                
                coverDiv.appendChild(img);
            } else {
                coverDiv.innerHTML = `<span class="text-white font-bold text-3xl">${book.charAt(0)}</span>`;
            }
            
            const grid = document.getElementById('selectionGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= maxChapters; i++) {
                grid.innerHTML += `
                    <button onclick="selectChapter(${i})" 
                        class="glass-card p-3 sm:p-4 rounded-lg sm:rounded-xl hover:bg-indigo-500 hover:text-white transition-all font-bold text-sm sm:text-base relative group overflow-hidden">
                        <span class="relative z-10">${i}</span>
                        <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/0 to-indigo-500/0 group-hover:from-indigo-500/20 group-hover:to-indigo-500/40 transition-all"></div>
                    </button>`;
            }
        }

        function selectChapter(chap) {
            state.chapter = chap;
            fetchChapter();
        }

        function addToHistory() {
            const existingIndex = history.findIndex(h => h.book === state.book);
            
            if (existingIndex !== -1) {
                history[existingIndex].chapter = state.chapter;
                history[existingIndex].timestamp = Date.now();
                const updatedEntry = history.splice(existingIndex, 1)[0];
                history.unshift(updatedEntry);
            } else {
                const entry = { 
                    book: state.book, 
                    chapter: state.chapter, 
                    timestamp: Date.now() 
                };
                history.unshift(entry);
            }
            
            if (history.length > 10) history = history.slice(0, 10);
            
            localStorage.setItem('selah_history', JSON.stringify(history));
            renderHistory();
        }

        function getBookProgress(book) {
            const maxChapters = findMax(book);
            const historyEntry = history.find(h => h.book === book);
            const currentChapter = historyEntry ? historyEntry.chapter : 0;
            const percentage = Math.round((currentChapter / maxChapters) * 100);
            
            return { 
                currentChapter: currentChapter,
                maxChapters: maxChapters, 
                percentage: percentage 
            };
        }

        function createProgressRing(percentage, size = 32) {
            const radius = (size - 4) / 2;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percentage / 100) * circumference;
            
            return `
                <div class="progress-ring-container" style="width: ${size}px; height: ${size}px;">
                    <svg class="progress-ring-svg" viewBox="0 0 ${size} ${size}">
                        <circle class="progress-ring-bg" cx="${size/2}" cy="${size/2}" r="${radius}"></circle>
                        <circle class="progress-ring-fill" cx="${size/2}" cy="${size/2}" r="${radius}" 
                            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"></circle>
                    </svg>
                    <span class="progress-text">${percentage}%</span>
                </div>
            `;
        }

        function renderReadingProgress() {
            const section = document.getElementById('progressSection');
            const grid = document.getElementById('progressGrid');
            
            const booksWithProgress = history
                .filter(h => h.chapter > 0)
                .map(h => ({
                    name: h.book,
                    ...getBookProgress(h.book)
                }));
            
            if (booksWithProgress.length === 0) {
                section.classList.add('hidden');
                return;
            }
            
            section.classList.remove('hidden');
            grid.innerHTML = booksWithProgress.map(({ name, currentChapter, maxChapters, percentage }) => `
                <div class="glass-card history-card progress-card select-none">
                    ${createProgressRing(percentage, window.innerWidth < 640 ? 32 : 40)}
                    <div class="history-card-content">
                        <div class="history-book-name text-slate-700 dark:text-slate-300">${name}</div>
                        <div class="history-chapter-info text-slate-500">Chapter ${currentChapter} of ${maxChapters}</div>
                        <div class="history-progress-detail text-slate-400">${percentage}% complete</div>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const section = document.getElementById('historySection');
            const grid = document.getElementById('historyGrid');
            
            if (history.length === 0) {
                section.classList.add('hidden');
                return;
            }
            
            section.classList.remove('hidden');
            grid.innerHTML = history.map(h => {
                const timeAgo = getTimeAgo(h.timestamp);
                
                return `
                    <button onclick="loadHistory('${h.book}', ${h.chapter})" class="glass-card continue-card hover:bg-indigo-500 hover:text-white transition-all group snap-center cursor-pointer">
                        <div class="continue-icon group-hover:bg-white/20 bg-gradient-to-br from-indigo-500 to-purple-600">
                            <div class="w-full h-full flex items-center justify-center text-white font-bold text-sm">
                                ${h.book.charAt(0)}
                            </div>
                        </div>
                        <div class="continue-content">
                            <div class="continue-book">${h.book}</div>
                            <div class="continue-chapter">Chapter ${h.chapter}</div>
                            <div class="continue-time">${timeAgo}</div>
                        </div>
                    </button>
                `;
            }).join('');
        }

        function getTimeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            if (seconds < 604800) return `${Math.floor(seconds / 86400)}d ago`;
            return 'Last week';
        }

        function clearAllProgress() {
            if (confirm('Reset all reading progress?')) {
                history = [];
                localStorage.removeItem('selah_history');
                renderReadingProgress();
                renderHistory();
                showToast('All progress reset');
            }
        }

        async function fetchChapter(continueAutoRead = false) {
            if (!continueAutoRead) {
                stopAudio();
            }
            
            try {
                const res = await fetch(`https://bible-api.com/${state.book}+${state.chapter}`);
                const data = await res.json();
                state.currentVerses = data.verses || [];
                
                addToHistory();
                renderReader();
                
                if (continueAutoRead && state.isAutoReading) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setTimeout(() => {
                        readFullChapter(0);
                    }, 500);
                }
                
                renderReadingProgress();
                window.location.hash = `${state.book}-${state.chapter}`;
            } catch (e) {
                console.error("Error fetching chapter", e);
                showToast("Failed to load chapter", true);
                state.isAutoReading = false;
            }
        }

        // FIXED: Update button text when rendering reader - hide restart/stop initially
        function renderReader() {
            document.getElementById('libraryView').classList.add('hidden');
            document.getElementById('selectionView').classList.add('hidden');
            document.getElementById('selectionFlow').classList.add('hidden');
            document.getElementById('readerView').classList.remove('hidden');
            document.getElementById('progressContainer').classList.remove('hidden');
            
            document.getElementById('readerTitle').innerText = `${state.book} ${state.chapter}`;
            
            document.getElementById('prevChapterBtn').disabled = state.chapter <= 1;
            document.getElementById('nextChapterBtn').disabled = state.chapter >= state.maxChapters;
            
            const chapterDropdown = document.getElementById('chapterJumpDropdown');
            chapterDropdown.innerHTML = '';
            for (let i = 1; i <= state.maxChapters; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.text = `Chapter ${i}`;
                option.selected = i === state.chapter;
                chapterDropdown.appendChild(option);
            }
            
            const verseDropdown = document.getElementById('verseDropdown');
            verseDropdown.innerHTML = '<option value="">Jump Verse</option>';
            
            const verseList = document.getElementById('verseList');
            verseList.innerHTML = '';
            
            state.currentVerses.forEach(v => {
                const option = document.createElement('option');
                option.value = `v-${v.verse}`;
                option.text = `Verse ${v.verse}`;
                verseDropdown.appendChild(option);
                
                const verseEl = document.createElement('div');
                verseEl.id = `v-${v.verse}`;
                verseEl.className = 'verse-container group hover:bg-white/50 dark:hover:bg-slate-800/50 transition-all';
                verseEl.innerHTML = `
                    <div class="flex gap-3 sm:gap-4">
                        <span class="text-indigo-500 font-bold text-base sm:text-lg select-none flex-shrink-0 w-6 sm:w-8">${v.verse}</span>
                        <p class="text-base sm:text-lg leading-relaxed text-slate-800 dark:text-slate-200">${v.text}</p>
                    </div>
                    <div class="mt-3 sm:mt-4 flex gap-2 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="speakVerse(${v.verse})" class="text-xs bg-indigo-500/10 text-indigo-500 px-2.5 sm:px-3 py-1.5 rounded-lg hover:bg-indigo-500 hover:text-white transition-all flex items-center gap-1.5 sm:gap-2">
                            <i class="fas fa-volume-up"></i> <span class="hidden sm:inline">Read</span>
                        </button>
                        <button onclick="toggleInsight('insight-${v.verse}', '${state.book}', ${state.chapter}, ${v.verse})" class="text-xs bg-amber-500/10 text-amber-600 px-2.5 sm:px-3 py-1.5 rounded-lg hover:bg-amber-500 hover:text-white transition-all flex items-center gap-1.5 sm:gap-2">
                            <i class="fas fa-lightbulb"></i> <span class="hidden sm:inline">Explain</span>
                        </button>
                    </div>
                    <div id="insight-${v.verse}" class="insight-panel mt-2"></div>
                `;
                verseList.appendChild(verseEl);
            });
            
            // FIXED: Hide restart and stop buttons initially, only show Read All
            document.getElementById('btn-restart-audio').classList.add('hidden');
            document.getElementById('btn-stop-all').classList.add('hidden');
            document.getElementById('btn-read-all').classList.remove('hidden');
            
            // FIXED: Set correct button text based on saved position
            const savedPosition = localStorage.getItem(`selah_audio_pos_${state.book}_${state.chapter}`);
            const resumeIndex = savedPosition ? parseInt(savedPosition) : 0;
            const buttonText = resumeIndex > 0 ? `Resume (v${resumeIndex + 1})` : "Read All";
            document.getElementById('read-all-text').innerText = buttonText;
            
            updateProgress();
        }

        function jumpToVerse(verseId) {
            if (!verseId) return;
            const el = document.getElementById(verseId);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('ring-2', 'ring-indigo-500');
                setTimeout(() => el.classList.remove('ring-2', 'ring-indigo-500'), 2000);
            }
        }

        function jumpToChapter(chap) {
            const chapter = parseInt(chap);
            if (chapter && chapter !== state.chapter) {
                state.chapter = chapter;
                state.isAutoReading = false;
                fetchChapter();
            }
        }

        function navChapter(direction) {
            const newChapter = state.chapter + direction;
            if (newChapter >= 1 && newChapter <= state.maxChapters) {
                state.chapter = newChapter;
                state.isAutoReading = false;
                fetchChapter();
            }
        }

        function updateProgress() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            document.getElementById('progressBar').style.width = `${Math.min(progress, 100)}%`;
        }

        function loadHistory(book, chapter) {
            state.book = book;
            state.chapter = chapter;
            state.maxChapters = findMax(book);
            fetchChapter();
        }

        function renderLibrary() {
            const otGrid = document.getElementById('otGrid');
            const ntGrid = document.getElementById('ntGrid');
            
            otGrid.innerHTML = BIBLE_BOOKS.OT.map(([name, chapters, theme, tagline]) => {
                const coverUrl = BOOK_COVERS[name];
                return createBookCard(name, chapters, theme, tagline, coverUrl);
            }).join('');
            
            ntGrid.innerHTML = BIBLE_BOOKS.NT.map(([name, chapters, theme, tagline]) => {
                const coverUrl = BOOK_COVERS[name];
                return createBookCard(name, chapters, theme, tagline, coverUrl);
            }).join('');
        }

        function createBookCard(name, chapters, theme, tagline, coverUrl) {
            const uniqueId = 'img-' + name.replace(/\s+/g, '-').toLowerCase();
            
            return `
                <div class="book-cover-container group" onclick="openCoverModal('${name}', ${chapters})">
                    <div class="book-initial">${name.charAt(0)}</div>
                    ${coverUrl ? 
                        `<img id="${uniqueId}" 
                              data-src="${coverUrl}" 
                              alt="${name}" 
                              class="book-cover-art" 
                              width="400" 
                              height="600"
                              loading="lazy"
                              decoding="async">` : ''
                    }
                    <div class="book-spine"></div>
                    <span class="book-cover-badge">${theme}</span>
                    <div class="book-cover-overlay">
                        <h3 class="book-cover-title display-font">${name}</h3>
                        <p class="book-cover-chapters">${chapters} chapters</p>
                    </div>
                </div>
            `;
        }

        function lazyLoadImages() {
            const images = document.querySelectorAll('.book-cover-art[data-src]');
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        const src = img.getAttribute('data-src');
                        if (src) {
                            loadImageWithFallback(img, src, () => {
                                observer.unobserve(img);
                            }, () => {
                                observer.unobserve(img);
                            });
                        }
                    }
                });
            }, {
                rootMargin: '50px 0px',
                threshold: 0.01
            });

            images.forEach(img => imageObserver.observe(img));
        }

        async function fetchVOTD() {
            const daily = getDailyVerseRef();
            state.currentVOTD = daily;
            try {
                const res = await fetch(`https://bible-api.com/${daily.ref}`);
                const data = await res.json();
                document.getElementById('votdText').innerText = `"${data.text.trim()}"`;
                document.getElementById('votdRef').innerText = data.reference;
                
                document.getElementById('votdExplainBtn').onclick = () => {
                    toggleInsight('votd-insight', daily.book, daily.chap, daily.verse);
                };
            } catch (e) { 
                console.error("Error loading VOTD", e); 
            }
        }

        function openVotd() {
            if(!state.currentVOTD) return;
            stopAudio();
            state.book = state.currentVOTD.book;
            state.chapter = state.currentVOTD.chap;
            state.maxChapters = findMax(state.book);
            fetchChapter();
        }

        function resetToLibrary() {
            stopAudio();
            state.isAutoReading = false;
            
            document.getElementById('readerView').classList.add('hidden');
            document.getElementById('selectionView').classList.add('hidden');
            document.getElementById('selectionFlow').classList.add('hidden');
            document.getElementById('progressContainer').classList.add('hidden');
            document.getElementById('libraryView').classList.remove('hidden');
            
            window.location.hash = '';
            
            renderLibrary();
            lazyLoadImages();
            renderReadingProgress();
            renderHistory();
        }

        function handleSearch(query) {
            if (!query.trim()) return;
            
            const match = query.match(/^([\w\s]+?)\s+(\d+)(?::(\d+))?$/i);
            if (match) {
                const bookName = match[1].trim();
                const chapter = parseInt(match[2]);
                const verse = match[3] ? parseInt(match[3]) : null;
                
                let foundBook = null;
                let maxChapters = 0;
                
                for (let section of Object.values(BIBLE_BOOKS)) {
                    for (let [name, chapters] of section) {
                        if (name.toLowerCase() === bookName.toLowerCase() || 
                            name.toLowerCase().replace(/\s/g, '') === bookName.toLowerCase().replace(/\s/g, '')) {
                            foundBook = name;
                            maxChapters = chapters;
                            break;
                        }
                    }
                    if (foundBook) break;
                }
                
                if (foundBook && chapter > 0 && chapter <= maxChapters) {
                    state.book = foundBook;
                    state.chapter = chapter;
                    state.maxChapters = maxChapters;
                    fetchChapter().then(() => {
                        if (verse) {
                            setTimeout(() => jumpToVerse(`v-${verse}`), 500);
                        }
                    });
                    return;
                }
            }
            
            showToast('Format: "Book Chapter" (e.g., "John 3")', true);
        }

        function applyTheme(isDark) {
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-slate-500';
        }

        function toggleDarkMode() {
            applyTheme(!document.documentElement.classList.contains('dark'));
        }

        function showAuthorsModal() {
            document.getElementById('authorsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeAuthorsModal(event) {
            if (event && event.target !== event.currentTarget && !event.target.closest('button')) return;
            document.getElementById('authorsModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function init() { 
            renderLibrary(); 
            lazyLoadImages();
            renderHistory(); 
            renderReadingProgress();
            fetchVOTD(); 
            applyTheme(localStorage.getItem('theme') === 'dark'); 

            document.addEventListener('click', initAudio, { once: true });
            document.addEventListener('touchstart', initAudio, { once: true });

            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const parts = hash.split('-');
                if (parts.length === 2) {
                    state.book = decodeURIComponent(parts[0]);
                    state.chapter = parseInt(parts[1]);
                    state.maxChapters = findMax(state.book);
                    fetchChapter();
                }
            }
        }

        window.addEventListener('scroll', updateProgress);
        window.addEventListener('DOMContentLoaded', init);
        window.addEventListener('resize', () => {
            renderReadingProgress();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeCoverModal();
                closeAuthorsModal();
            }
        });
    </script>
</body>
</html>
